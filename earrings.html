<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMIGEM — Earrings Catalogue</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#ede5db;color:#2b2118;font-family:'Montserrat',sans-serif;min-height:100vh;}
  .site-header{background:#ede5db;border-bottom:1px solid #c4b8aa;padding:28px 40px 20px;text-align:center;position:relative;}
  .header-img-wrap{position:relative;display:inline-block;margin-bottom:16px;}
  .header-img{width:100%;max-width:900px;height:180px;object-fit:cover;border-radius:4px;display:block;}
  .header-img-placeholder{width:900px;max-width:100%;height:180px;background:linear-gradient(135deg,#d4c8bc 0%,#c4b8aa 100%);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;color:#8a7a6a;letter-spacing:3px;}
  .btn-replace-header{position:absolute;bottom:8px;right:8px;background:rgba(43,33,24,0.75);color:#ede5db;border:none;padding:6px 14px;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:background 0.2s;}
  .btn-replace-header:hover{background:rgba(43,33,24,0.95);}
  .brand-title{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:700;color:#1a1008;letter-spacing:10px;text-transform:uppercase;line-height:1;margin-bottom:6px;}
  .brand-subtitle{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:300;letter-spacing:5px;color:#9a8878;text-transform:uppercase;margin-bottom:4px;}
  .brand-collection{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:4px;color:#c4b8aa;text-transform:uppercase;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;padding:14px 40px;border-bottom:1px solid #c4b8aa;background:#e8ddd4;}
  .toolbar-left{font-size:12px;color:#9a8878;letter-spacing:1px;}
  .btn{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:8px 20px;border:none;cursor:pointer;transition:all 0.2s;border-radius:2px;}
  .btn-dark{background:#2b2118;color:#ede5db;} .btn-dark:hover{background:#1a1008;}
  .btn-outline{background:transparent;color:#2b2118;border:1px solid #2b2118;margin-left:8px;} .btn-outline:hover{background:#2b2118;color:#ede5db;}
  .table-wrap{padding:0 40px 40px;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;min-width:700px;}
  thead tr{border-bottom:2px solid #9a8878;}
  thead th{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#9a8878;padding:14px 12px 10px;text-align:left;white-space:nowrap;}
  thead th.right{text-align:right;} thead th.center{text-align:center;}
  tbody tr{border-bottom:1px solid #d4c8bc;transition:background 0.15s;}
  tbody tr:nth-child(even){background:#e8ddd4;} tbody tr:hover{background:#ddd0c4;}
  td{padding:10px 12px;vertical-align:middle;font-size:12px;color:#2b2118;}
  td.right{text-align:right;} td.center{text-align:center;}
  .item-photo{width:72px;height:72px;object-fit:cover;border-radius:3px;display:block;cursor:pointer;}
  .photo-cell{width:88px;min-width:88px;}
  .item-no{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:#2b2118;white-space:nowrap;}
  .weight-val{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:#2b2118;}
  .weight-unit{font-size:9px;color:#9a8878;letter-spacing:1px;}
  .ask-price{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:#2b2118;white-space:nowrap;}
  .desc-text{font-size:11px;color:#5a4a3a;line-height:1.55;max-width:380px;}
  .btn-del{background:none;border:none;color:#c4b8aa;cursor:pointer;font-size:16px;padding:4px 8px;transition:color 0.2s;} .btn-del:hover{color:#8a2020;}
  .photo-wrap{position:relative;display:inline-block;}
  .photo-wrap:hover .photo-replace-btn{opacity:1;}
  .photo-replace-btn{position:absolute;inset:0;background:rgba(43,33,24,0.6);color:#ede5db;font-size:9px;letter-spacing:1px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;cursor:pointer;border-radius:3px;text-align:center;border:none;width:100%;padding:0;}
  .add-section{margin:0 40px 40px;border:1px solid #c4b8aa;border-radius:4px;overflow:hidden;}
  .add-section-header{background:#2b2118;color:#ede5db;padding:12px 20px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
  .add-form{padding:24px;background:#e8ddd4;display:none;} .add-form.open{display:block;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-group label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#9a8878;font-weight:600;}
  .form-group input,.form-group textarea{background:#ede5db;border:1px solid #c4b8aa;border-radius:2px;padding:8px 10px;font-family:'Montserrat',sans-serif;font-size:12px;color:#2b2118;outline:none;transition:border-color 0.2s;}
  .form-group input:focus,.form-group textarea:focus{border-color:#2b2118;}
  .form-group textarea{resize:vertical;min-height:70px;} .form-desc{grid-column:1/-1;}
  .form-photo-preview{width:80px;height:80px;object-fit:cover;border-radius:3px;border:1px solid #c4b8aa;display:none;margin-top:8px;}
  .btn-add-item{background:#2b2118;color:#ede5db;border:none;padding:10px 28px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background 0.2s;} .btn-add-item:hover{background:#1a1008;}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(20,14,8,0.85);z-index:1000;align-items:center;justify-content:center;}
  .lightbox.active{display:flex;}
  .lightbox img{max-width:80vw;max-height:80vh;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
  .lightbox-close{position:absolute;top:24px;right:32px;color:#ede5db;font-size:32px;cursor:pointer;background:none;border:none;line-height:1;}
  @media print{.toolbar,.add-section,.btn-del,.photo-replace-btn,.btn-replace-header{display:none!important;}body{background:#fff;}.site-header{padding:16px;}.table-wrap{padding:0 16px 16px;}tbody tr:hover{background:inherit;}}
</style>

    <button class="btn-add-item" onclick="addItem()">Add to Catalogue</button>
  </div>
</div>

function loadData(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}return seedData.map((d,i)=>({...d,id:'seed_'+i}));}
function saveData(items){localStorage.setItem(STORAGE_KEY,JSON.stringify(items));}
let items=loadData();
function renderTable(){
  const tbody=document.getElementById('tableBody');
  document.getElementById('itemCount').textContent=items.length+' items';
  tbody.innerHTML='';
  items.forEach((item,idx)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="photo-cell center"><div class="photo-wrap"><img class="item-photo" src="${item.img||''}" alt="${item.item_no}" onclick="openLightbox('${item.img||''}')" onerror="this.style.display='none'"><button class="photo-replace-btn" onclick="replaceItemPhoto(${idx},event)">Replace</button></div></td><td><span class="item-no">${item.item_no}</span></td><td class="center">${item.qty||1}</td><td class="center"><span class="weight-val">${item.weight}</span><br><span class="weight-unit">cts</span></td><td><div class="desc-text">${item.desc}</div></td><td class="right"><span class="ask-price">${item.ask}</span></td><td class="center"><button class="btn-del" onclick="deleteItem(${idx})" title="Remove">✕</button></td>`;
    tbody.appendChild(tr);
  });
}
function deleteItem(idx){if(!confirm('Remove '+items[idx].item_no+'?'))return;items.splice(idx,1);saveData(items);renderTable();}
function replaceItemPhoto(idx,e){e.stopPropagation();const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){items[idx].img=ev.target.result;saveData(items);renderTable();};r.readAsDataURL(f);};inp.click();}
function addItem(){const item_no=document.getElementById('f_item').value.trim();const weight=document.getElementById('f_weight').value.trim();const ask=document.getElementById('f_ask').value.trim();const desc=document.getElementById('f_desc').value.trim();const img=document.getElementById('f_photo_preview').src||'';if(!item_no){alert('Please enter an Item No.');return;}items.push({item_no,qty:'1',weight,ask,desc,img:img.startsWith('data:')?img:''});saveData(items);renderTable();document.getElementById('f_item').value='';document.getElementById('f_weight').value='';document.getElementById('f_ask').value='';document.getElementById('f_desc').value='';document.getElementById('f_photo_preview').style.display='none';document.getElementById('f_photo_preview').src='';document.getElementById('f_photo').value='';toggleAddForm(false);}
function previewPhoto(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){const p=document.getElementById('f_photo_preview');p.src=e.target.result;p.style.display='block';};r.readAsDataURL(f);}
function toggleAddForm(forceClose){const form=document.getElementById('addForm');const arrow=document.getElementById('addArrow');if(forceClose===false||form.classList.contains('open')){form.classList.remove('open');arrow.textContent='▼';}else{form.classList.add('open');arrow.textContent='▲';form.scrollIntoView({behavior:'smooth',block:'start'});}}
function openLightbox(src){if(!src)return;document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('active');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('active');}
function replaceHeaderImg(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){document.getElementById('headerImg').src=e.target.result;document.getElementById('headerImg').style.display='block';document.getElementById('headerPlaceholder').style.display='none';};r.readAsDataURL(f);}
renderTable();
</script>
