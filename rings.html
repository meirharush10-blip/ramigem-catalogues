<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMIGEM — Rings Catalogue</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ede5db;
    color: #2b2118;
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: #ede5db;
    border-bottom: 1px solid #c4b8aa;
    padding: 28px 40px 20px;
    text-align: center;
    position: relative;
  }
  .header-img-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 16px;
  }
  .header-img {
    width: 100%;
    max-width: 900px;
    height: 180px;
    object-fit: cover;
    border-radius: 4px;
    display: block;
  }
  .header-img-placeholder {
    width: 900px;
    max-width: 100%;
    height: 180px;
    background: linear-gradient(135deg, #d4c8bc 0%, #c4b8aa 100%);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: #8a7a6a;
    letter-spacing: 3px;
  }
  .btn-replace-header {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(43,33,24,0.75);
    color: #ede5db;
    border: none;
    padding: 6px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .btn-replace-header:hover { background: rgba(43,33,24,0.95); }

  .brand-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 700;
    color: #1a1008;
    letter-spacing: 10px;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 6px;
  }
  .brand-subtitle {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 5px;
    color: #9a8878;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .brand-collection {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #c4b8aa;
    text-transform: uppercase;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 40px;
    border-bottom: 1px solid #c4b8aa;
    background: #e8ddd4;
  }
  .toolbar-left { font-size: 12px; color: #9a8878; letter-spacing: 1px; }
  .btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .btn-dark { background: #2b2118; color: #ede5db; }
  .btn-dark:hover { background: #1a1008; }
  .btn-outline { background: transparent; color: #2b2118; border: 1px solid #2b2118; margin-left: 8px; }
  .btn-outline:hover { background: #2b2118; color: #ede5db; }

  /* TABLE */
  .table-wrap { padding: 0 40px 40px; overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0;
    min-width: 700px;
  }
  thead tr {
    border-bottom: 2px solid #9a8878;
  }
  thead th {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #9a8878;
    padding: 14px 12px 10px;
    text-align: left;
    white-space: nowrap;
  }
  thead th.right { text-align: right; }
  thead th.center { text-align: center; }

  tbody tr {
    border-bottom: 1px solid #d4c8bc;
    transition: background 0.15s;
  }
  tbody tr:nth-child(even) { background: #e8ddd4; }
  tbody tr:hover { background: #ddd0c4; }

  td {
    padding: 10px 12px;
    vertical-align: middle;
    font-size: 12px;
    color: #2b2118;
  }
  td.right { text-align: right; }
  td.center { text-align: center; }

  .item-photo {
    width: 72px;
    height: 72px;
    object-fit: cover;
    border-radius: 3px;
    display: block;
    cursor: pointer;
  }
  .photo-cell { width: 88px; min-width: 88px; }

  .item-no {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    color: #2b2118;
    white-space: nowrap;
  }
  .weight-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: #2b2118;
  }
  .weight-unit { font-size: 9px; color: #9a8878; letter-spacing: 1px; }
  .ask-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 700;
    color: #2b2118;
    white-space: nowrap;
  }
  .desc-text {
    font-size: 11px;
    color: #5a4a3a;
    line-height: 1.55;
    max-width: 380px;
  }

  /* Delete btn */
  .btn-del {
    background: none;
    border: none;
    color: #c4b8aa;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .btn-del:hover { color: #8a2020; }

  /* Replace photo on hover */
  .photo-wrap { position: relative; display: inline-block; }
  .photo-wrap:hover .photo-replace-btn { opacity: 1; }
  .photo-replace-btn {
    position: absolute;
    inset: 0;
    background: rgba(43,33,24,0.6);
    color: #ede5db;
    font-size: 9px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    cursor: pointer;
    border-radius: 3px;
    text-align: center;
    border: none;
    width: 100%;
    padding: 0;
  }

  /* ADD FORM */
  .add-section {
    margin: 0 40px 40px;
    border: 1px solid #c4b8aa;
    border-radius: 4px;
    overflow: hidden;
  }
  .add-section-header {
    background: #2b2118;
    color: #ede5db;
    padding: 12px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .add-form {
    padding: 24px;
    background: #e8ddd4;
    display: none;
  }
  .add-form.open { display: block; }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9a8878;
    font-weight: 600;
  }
  .form-group input, .form-group textarea {
    background: #ede5db;
    border: 1px solid #c4b8aa;
    border-radius: 2px;
    padding: 8px 10px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    color: #2b2118;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: #2b2118; }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-desc { grid-column: 1 / -1; }
  .form-photo-preview {
    width: 80px; height: 80px;
    object-fit: cover;
    border-radius: 3px;
    border: 1px solid #c4b8aa;
    display: none;
    margin-top: 8px;
  }
  .btn-add-item {
    background: #2b2118;
    color: #ede5db;
    border: none;
    padding: 10px 28px;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .btn-add-item:hover { background: #1a1008; }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,14,8,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 80vw;
    max-height: 80vh;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .lightbox-close {
    position: absolute;
    top: 24px; right: 32px;
    color: #ede5db;
    font-size: 32px;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
  }

  /* PRINT */
  @media print {
    .toolbar, .add-section, .btn-del, .photo-replace-btn, .btn-replace-header { display: none !important; }
    body { background: #fff; }
    .site-header { padding: 16px; }
    .table-wrap { padding: 0 16px 16px; }
    tbody tr:hover { background: inherit; }
  }

  /* EDIT MODAL */
  .edit-modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(43,33,24,0.55);
    z-index: 900;
  }
  .edit-modal-overlay.active { display: block; }
  .edit-modal {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #f5ede3;
    border: 1px solid #d6c9b8;
    z-index: 901;
    width: min(92vw, 700px);
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(43,33,24,0.2);
    border-radius: 2px;
  }
  .edit-modal.active { display: flex; flex-direction: column; }
  .edit-modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 20px 14px;
    border-bottom: 1px solid #d6c9b8;
  }
  .edit-modal-body {
    display: flex; flex-wrap: wrap; gap: 20px;
    padding: 20px;
  }
  .edit-img-wrap { flex: 0 0 auto; width: min(100%, 280px); }
  .edit-fields { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 10px; }
  .edit-fields label {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #7a6a5a; margin-bottom: -6px;
  }
  .edit-fields input, .edit-fields textarea {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    color: #2b2118;
    background: #ede5db;
    border: 1px solid #d6c9b8;
    padding: 8px 10px;
    border-radius: 2px;
    resize: vertical;
  }
  .edit-fields input:focus, .edit-fields textarea:focus {
    outline: none; border-color: #2b2118;
  }
  .edit-modal-footer {
    display: flex; justify-content: flex-end; gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid #d6c9b8;
  }
  .edit-cancel-btn {
    background: none; border: 1px solid #d6c9b8;
    color: #7a6a5a; font-size: 11px; letter-spacing: 0.1em;
    padding: 8px 18px; cursor: pointer; border-radius: 2px;
  }
  .edit-save-btn {
    background: #2b2118; border: none;
    color: #ede5db; font-size: 11px; letter-spacing: 0.1em;
    padding: 8px 20px; cursor: pointer; border-radius: 2px;
  }
  .edit-save-btn:hover { background: #3d3028; }
  .edit-replace-btn {
    font-size: 11px; letter-spacing: 0.05em;
    background: none; border: 1px solid #d6c9b8;
    color: #5a4a3a; padding: 5px 12px; cursor: pointer;
    border-radius: 2px;
  }

</style>
</head>
<body>

<!-- HEADER -->
<div class="site-header">
  <div class="header-img-wrap" id="headerImgWrap">
    <div class="header-img-placeholder" id="headerPlaceholder">
      COLOMBIAN EMERALDS &nbsp;·&nbsp; NEW YORK
    </div>
    <img id="headerImg" class="header-img" src="" style="display:none;" alt="Header">
    <button class="btn-replace-header" onclick="document.getElementById('headerImgInput').click()">
      ↑ Replace Header Image
    </button>
    <input type="file" id="headerImgInput" accept="image/*" style="display:none;" onchange="replaceHeaderImg(this)">
  </div>
  <div class="brand-title">RAMIGEM</div>
  <div class="brand-subtitle">New York &nbsp;·&nbsp; Colombian Muzo Emeralds</div>
  <div class="brand-collection">Rings Catalogue &nbsp;·&nbsp; April 2026</div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-left" id="itemCount"></div>
  <div>
    <button class="btn btn-dark" onclick="window.print()">Print / PDF</button>
    <button class="btn btn-outline" onclick="toggleAddForm()">+ Add Item</button>
  </div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="catalogTable">
    <thead>
      <tr>
        <th class="center">Photo</th>
        <th>Item No.</th>
        <th class="center">Qty</th>
        <th class="center">Weight (cts)</th>
        <th>Description</th>
        <th class="right">Asking Price</th>
        <th class="center"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- ADD FORM -->
<div class="add-section">
  <div class="add-section-header" onclick="toggleAddForm()">
    <span>ADD NEW ITEM</span>
    <span id="addArrow">▼</span>
  </div>
  <div class="add-form" id="addForm">
    <div class="form-grid">
      <div class="form-group">
        <label>Item No.</label>
        <input type="text" id="f_item" placeholder="e.g. RG-150">
      </div>
      <div class="form-group">
        <label>Weight (cts)</label>
        <input type="text" id="f_weight" placeholder="e.g. 2.45">
      </div>
      <div class="form-group">
        <label>Asking Price</label>
        <input type="text" id="f_ask" placeholder="e.g. $25,000">
      </div>
      <div class="form-group">
        <label>Photo</label>
        <input type="file" id="f_photo" accept="image/*" onchange="previewPhoto(this)">
        <img id="f_photo_preview" class="form-photo-preview" alt="Preview">
      </div>
      <div class="form-group form-desc">
        <label>Description</label>
        <textarea id="f_desc" placeholder="Ring description..."></textarea>
      </div>
    </div>
    <button class="btn-add-item" onclick="addItem()">Add to Catalogue</button>
  </div>
</div>


<!-- EDIT MODAL -->
<div class="edit-modal-overlay" id="editModalOverlay" onclick="closeEditModal()"></div>
<div class="edit-modal" id="editModal">
  <div class="edit-modal-header">
    <span id="editModalTitle" style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;"></span>
    <button onclick="closeEditModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#2b2118;padding:0 4px;">×</button>
  </div>
  <div class="edit-modal-body">
    <div class="edit-img-wrap">
      <img id="editModalImg" src="" alt="" style="max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto;cursor:pointer;" onclick="openLightbox(document.getElementById('editModalImg').src)" title="Click to enlarge">
      <div style="margin-top:8px;text-align:center;">
        <button class="edit-replace-btn" onclick="replaceEditPhoto()">📷 Replace Photo</button>
      </div>
    </div>
    <div class="edit-fields">
      <label>Item No.</label>
      <input type="text" id="editItemNo" readonly style="opacity:0.6;cursor:not-allowed;">
      <label>Weight (cts)</label>
      <input type="text" id="editWeight" placeholder="e.g. 1.50">
      <label>Description</label>
      <textarea id="editDesc" rows="3" placeholder="Description..."></textarea>
      <label>Price</label>
      <input type="text" id="editPrice" placeholder="e.g. $25,000">
    </div>
  </div>
  <div class="edit-modal-footer">
    <button class="edit-cancel-btn" onclick="closeEditModal()">Cancel</button>
    <button class="edit-save-btn" onclick="saveEditModal()">Save Changes</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return seedData.map((d,i) => ({...d, id: 'seed_'+i}));
}

function saveData(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

let items = loadData();

function renderTable() {
  const tbody = document.getElementById('tableBody');
  document.getElementById('itemCount').textContent = items.length + ' items';
  tbody.innerHTML = '';
  items.forEach((item, idx) => {
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.title = 'Click to view / edit';
    tr.innerHTML = `
      <td class="photo-cell center">
        <div class="photo-wrap">
          <img class="item-photo" src="${item.img || ''}" alt="${item.item_no}"
            onerror="this.style.display='none'">
          <button class="photo-replace-btn" onclick="replaceItemPhoto(${idx}, event)">Replace</button>
        </div>
      </td>
      <td><span class="item-no">${item.item_no}</span></td>
      <td class="center"><span class="weight-val">${item.weight}</span><br><span class="weight-unit">cts</span></td>
      <td><div class="desc-text">${item.desc}</div></td>
      <td class="right"><span class="ask-price">${item.ask}</span></td>
      <td class="center"><button class="btn-del" onclick="deleteItem(${idx}, event)" title="Remove">✕</button></td>
    `;
    tr.onclick = function() { openEditModal(idx); };
    tbody.appendChild(tr);
  });
}


function deleteItem(idx, e) {
  if (e) e.stopPropagation();
  if (!confirm('Remove ' + items[idx].item_no + ' from catalogue?')) return;
  items.splice(idx, 1);
  saveData(items);
  renderTable();
}

function replaceItemPhoto(idx, e) {
  e.stopPropagation();
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = function() {
    const file = this.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      items[idx].img = ev.target.result;
      saveData(items); renderTable();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function addItem() {
  const item_no = document.getElementById('f_item').value.trim();
  const weight = document.getElementById('f_weight').value.trim();
  const ask = document.getElementById('f_ask').value.trim();
  const desc = document.getElementById('f_desc').value.trim();
  const img = document.getElementById('f_photo_preview').src || '';
  if (!item_no) { alert('Please enter an Item No.'); return; }
  items.push({ item_no, qty:'1', weight, ask, desc, img: img.startsWith('data:') ? img : '' });
  saveData(items); renderTable();
  document.getElementById('f_item').value = '';
  document.getElementById('f_weight').value = '';
  document.getElementById('f_ask').value = '';
  document.getElementById('f_desc').value = '';
  document.getElementById('f_photo_preview').style.display = 'none';
  document.getElementById('f_photo_preview').src = '';
  document.getElementById('f_photo').value = '';
  toggleAddForm(false);
}

function previewPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const prev = document.getElementById('f_photo_preview');
    prev.src = e.target.result; prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function toggleAddForm(forceClose) {
  const form = document.getElementById('addForm');
  const arrow = document.getElementById('addArrow');
  if (forceClose === false || form.classList.contains('open')) {
    form.classList.remove('open'); arrow.textContent = '▼';
  } else {
    form.classList.add('open'); arrow.textContent = '▲';
    form.scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function openLightbox(src) {
  if (!src) return;
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}

let _editIdx = null;
let _editNewImg = null;

function openEditModal(idx) {
  const item = items[idx];
  _editIdx = idx;
  _editNewImg = null;
  document.getElementById('editModalTitle').textContent = item.item_no;
  document.getElementById('editModalImg').src = item.img || '';
  document.getElementById('editModalImg').style.display = item.img ? 'block' : 'none';
  document.getElementById('editItemNo').value = item.item_no;
  document.getElementById('editWeight').value = item.weight;
  document.getElementById('editDesc').value = item.desc;
  document.getElementById('editPrice').value = item.ask;
  document.getElementById('editModalOverlay').classList.add('active');
  document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
  document.getElementById('editModalOverlay').classList.remove('active');
  document.getElementById('editModal').classList.remove('active');
  _editIdx = null;
  _editNewImg = null;
}

function replaceEditPhoto() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = function() {
    const file = this.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      _editNewImg = ev.target.result;
      document.getElementById('editModalImg').src = _editNewImg;
      document.getElementById('editModalImg').style.display = 'block';
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function saveEditModal() {
  if (_editIdx === null) return;
  items[_editIdx].weight = document.getElementById('editWeight').value.trim();
  items[_editIdx].desc = document.getElementById('editDesc').value.trim();
  items[_editIdx].ask = document.getElementById('editPrice').value.trim();
  if (_editNewImg) items[_editIdx].img = _editNewImg;
  saveData(items);
  renderTable();
  closeEditModal();
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

function replaceHeaderImg(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('headerImg').src = e.target.result;
    document.getElementById('headerImg').style.display = 'block';
    document.getElementById('headerPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// Init
renderTable();
</script>
</body>
</html>
