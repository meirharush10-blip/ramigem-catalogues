<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ramigem CRM">
<meta name="theme-color" content="#FFFFFF">
<meta name="description" content="Ramigem Emerald CRM — Meir Harush">
<link rel="manifest" id="pwa-manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<title>Ramigem CRM</title>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS — GRAFF.COM AESTHETIC
═══════════════════════════════════════════════════ */
:root {
  --white:       #FFFFFF;
  --bg:          #FAFAF8;
  --bg2:         #F5F5F3;
  --border:      #E8E8E6;
  --border-light:#F0F0EE;
  --text:        #0A0A0A;
  --text-mid:    #4A4A4A;
  --text-muted:  #9A9A9A;
  --champagne:   #C4A882;
  --champ-dark:  #A8916A;
  --champ-light: #EAD9C4;
  --dot-hot:     #8B1C1C;
  --dot-active:  #1C5230;
  --dot-followup:#7A5C1E;
  --dot-cold:    #3D5268;
  --nav-h:       64px;
  --top-h:       56px;
  --hero-h:      72vh;

  /* Image URLs — GitHub Pages base */
  --img-base: 'https://meirharush10-blip.github.io/ramigem-catalogues/media';
}

/* ── RESET ── */
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  height: 100%;
  background: var(--white);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 14px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── APP SHELL ── */
#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  background: var(--white);
}

/* ═══════════════════════════════════════════════════
   TOP BAR — GRAFF STYLE
═══════════════════════════════════════════════════ */
#top-bar {
  height: var(--top-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  position: relative;
  z-index: 50;
}
.top-logo {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: 0.28em;
  color: var(--text);
  text-transform: uppercase;
  user-select: none;
}
.top-logo span {
  color: var(--champagne);
  font-weight: 400;
}
.top-icons {
  display: flex;
  align-items: center;
  gap: 18px;
}
.top-icon {
  width: 20px;
  height: 20px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.top-icon svg {
  width: 18px;
  height: 18px;
  stroke: var(--text);
  stroke-width: 1.2;
  fill: none;
}

/* ═══════════════════════════════════════════════════
   PAGES
═══════════════════════════════════════════════════ */
.page {
  display: none;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + 8px);
  opacity: 0;
  transition: opacity 0.22s ease;
  -webkit-overflow-scrolling: touch;
  background: var(--white);
}
.page.active  { display: block; }
.page.visible { opacity: 1; }

/* ═══════════════════════════════════════════════════
   HERO — FULL BLEED GRAFF STYLE
═══════════════════════════════════════════════════ */
.hero {
  position: relative;
  width: 100%;
  height: var(--hero-h);
  min-height: 420px;
  max-height: 600px;
  overflow: hidden;
  background-color: #1A1A1A;
}
.hero-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}
.hero-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
/* Dark gradient overlay — only bottom 50% */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 35%,
    rgba(0,0,0,0.15) 60%,
    rgba(0,0,0,0.65) 100%
  );
  z-index: 1;
}
.hero-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 0 24px 32px;
  z-index: 2;
}
.hero-label {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.78);
  margin-bottom: 10px;
}
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px;
  font-weight: 300;
  font-style: italic;
  color: #FFFFFF;
  line-height: 1.15;
  letter-spacing: 0.01em;
  margin-bottom: 20px;
}
.hero-cta {
  display: inline-block;
  background: var(--champagne);
  color: #FFFFFF;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  padding: 12px 28px;
  border: none;
  cursor: pointer;
  width: 100%;
  text-align: center;
  transition: background 0.2s;
}
.hero-cta:active { background: var(--champ-dark); }

/* ═══════════════════════════════════════════════════
   SECTION HEADERS (editorial magazine style)
═══════════════════════════════════════════════════ */
.section-head {
  padding: 28px 24px 16px;
  border-bottom: 1px solid var(--border-light);
}
.section-eyebrow {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.01em;
  line-height: 1.2;
}
.section-count {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 300;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════════
   STATS ROW — editorial numerals
═══════════════════════════════════════════════════ */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--border);
}
.stat-cell {
  padding: 20px 0;
  text-align: center;
  border-right: 1px solid var(--border);
}
.stat-cell:last-child { border-right: none; }
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.01em;
}
.stat-lbl {
  font-family: 'Inter', sans-serif;
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 5px;
}

/* ═══════════════════════════════════════════════════
   LIST ROWS — no card boxes, just thin borders
═══════════════════════════════════════════════════ */
.list-row {
  display: flex;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.15s;
  background: var(--white);
  gap: 14px;
}
.list-row:active { background: var(--bg2); }
.list-row:last-child { border-bottom: none; }

/* Status dot */
.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-hot      { background: var(--dot-hot); }
.dot-active   { background: var(--dot-active); }
.dot-followup { background: var(--dot-followup); }
.dot-cold     { background: var(--dot-cold); }
.dot-warm     { background: var(--dot-followup); }
.dot-bounced  { background: #999; }
.dot-replied  { background: var(--dot-active); }
.dot-sent     { background: #4A6A8A; }
.dot-noreply  { background: var(--dot-cold); }
.dot-notsent  { background: #CCC; }

.row-main { flex: 1; min-width: 0; }
.row-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.row-sub {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.row-meta {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 300;
  color: var(--text-muted);
  margin-top: 2px;
}
.row-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}
.row-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
}
.row-date {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 300;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}
.row-arrow {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 300;
}

/* ═══════════════════════════════════════════════════
   TABS — minimal underline style
═══════════════════════════════════════════════════ */
.tabs-bar {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  background: var(--white);
  flex-shrink: 0;
}
.tabs-bar::-webkit-scrollbar { display: none; }
.tab-item {
  flex-shrink: 0;
  padding: 13px 16px 11px;
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -1px;
  transition: all 0.18s;
  white-space: nowrap;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.tab-item.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

/* ═══════════════════════════════════════════════════
   SEARCH — minimal bottom-border style
═══════════════════════════════════════════════════ */
.search-wrap {
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--white);
}
.search-wrap svg {
  width: 14px;
  height: 14px;
  stroke: var(--text-muted);
  stroke-width: 1.5;
  fill: none;
  flex-shrink: 0;
}
.search-input {
  flex: 1;
  height: 44px;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.02em;
}
.search-input::placeholder {
  color: var(--text-muted);
  font-weight: 300;
}

/* ═══════════════════════════════════════════════════
   ALERT ROWS — editorial follow-up list
═══════════════════════════════════════════════════ */
.alert-section {
  padding: 0;
}
.alert-row {
  display: flex;
  align-items: flex-start;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border-light);
  gap: 14px;
  background: var(--white);
}
.alert-accent {
  width: 2px;
  min-height: 44px;
  border-radius: 1px;
  flex-shrink: 0;
  margin-top: 2px;
}
.accent-overdue { background: var(--dot-hot); }
.accent-today   { background: var(--dot-followup); }
.accent-week    { background: var(--dot-active); }
.alert-body { flex: 1; min-width: 0; }
.alert-eyebrow {
  font-family: 'Inter', sans-serif;
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.alert-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.2;
}
.alert-company {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 300;
  color: var(--text-muted);
  margin-top: 2px;
  letter-spacing: 0.05em;
}
.alert-days-text {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 300;
  color: var(--text-muted);
  margin-top: 6px;
}
.alert-btns {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

/* ═══════════════════════════════════════════════════
   BUTTONS — champagne filled or ghost underline
═══════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  border: none;
  outline: none;
}
.btn-primary {
  background: var(--champagne);
  color: #FFFFFF;
  padding: 10px 18px;
}
.btn-primary:active { background: var(--champ-dark); }
.btn-ghost {
  background: transparent;
  color: var(--text-mid);
  padding: 10px 18px;
  border: 1px solid var(--border);
}
.btn-ghost:active { background: var(--bg2); }
.btn-link {
  background: transparent;
  color: var(--text-muted);
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.12em;
  font-size: 9px;
}
.btn-full { width: 100%; }
.btn-danger {
  background: transparent;
  color: #8B1C1C;
  border: 1px solid rgba(139,28,28,0.25);
  padding: 10px 18px;
}
.btn-danger:active { background: rgba(139,28,28,0.05); }

/* ═══════════════════════════════════════════════════
   TASKS — clean list inside a section
═══════════════════════════════════════════════════ */
.task-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border-light);
}
.task-row:last-of-type { border-bottom: none; }
.task-check {
  width: 16px; height: 16px;
  border: 1px solid var(--border);
  border-radius: 50%;
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s;
}
.task-check.done {
  background: var(--champagne);
  border-color: var(--champagne);
}
.task-check.done::after {
  content: '';
  width: 5px; height: 3px;
  border-left: 1px solid #fff;
  border-bottom: 1px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}
.task-text-wrap { flex: 1; min-width: 0; }
.task-label {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--text);
  transition: all 0.18s;
}
.task-label.done {
  text-decoration: line-through;
  color: var(--text-muted);
}
.task-priority {
  font-family: 'Inter', sans-serif;
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 2px;
}
.task-del {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  line-height: 1;
}

.add-task-wrap {
  padding: 14px 24px;
  display: flex;
  gap: 10px;
  align-items: center;
  border-top: 1px solid var(--border-light);
}
.add-task-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 6px 0;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--text);
  outline: none;
}
.add-task-input::placeholder { color: var(--text-muted); }
.priority-select {
  background: transparent;
  border: 1px solid var(--border);
  padding: 6px 8px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 300;
  color: var(--text-mid);
  outline: none;
  cursor: pointer;
}

/* ═══════════════════════════════════════════════════
   CAMPAIGN BLOCK
═══════════════════════════════════════════════════ */
.campaign-block {
  padding: 24px 24px 0;
}
.campaign-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
}
.campaign-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--text);
}
.campaign-chevron {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.2s;
}
.campaign-chevron.open { transform: rotate(180deg); }
.campaign-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}
.campaign-body.open { max-height: 300px; }
.campaign-metrics {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  padding: 16px 0;
  border-bottom: 1px solid var(--border-light);
  gap: 0;
}
.c-metric { text-align: center; border-right: 1px solid var(--border-light); }
.c-metric:last-child { border-right: none; }
.c-metric-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
}
.c-metric-lbl {
  font-family: 'Inter', sans-serif;
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 4px;
}
.campaign-note {
  padding: 16px 0 24px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 300;
  color: var(--text-mid);
  line-height: 1.6;
  border-bottom: 1px solid var(--border-light);
}
.campaign-note strong {
  font-weight: 500;
  color: var(--text);
}

/* ═══════════════════════════════════════════════════
   PIPELINE — Kanban columns
═══════════════════════════════════════════════════ */
.pipeline-wrap {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0;
  min-height: 50vh;
}
.pipeline-wrap::-webkit-scrollbar { display: none; }
.pipeline-col {
  flex-shrink: 0;
  width: 180px;
  border-right: 1px solid var(--border);
}
.pipeline-col:last-child { border-right: none; }
.pipeline-col-head {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--white);
  z-index: 2;
}
.pipeline-col-name {
  font-family: 'Inter', sans-serif;
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.pipeline-count {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 300;
  color: var(--text);
}
.pipeline-cards { padding: 8px; }
.p-card {
  padding: 12px;
  border: 1px solid var(--border-light);
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.15s;
  background: var(--white);
}
.p-card:active { border-color: var(--champagne); }
.p-card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.2;
}
.p-card-co {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 300;
  color: var(--text-muted);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.p-card-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--champagne);
  margin-top: 4px;
}
.p-card-type {
  font-family: 'Inter', sans-serif;
  font-size: 8px;
  font-weight: 300;
  color: var(--text-muted);
  margin-top: 3px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
}

(function setupPWA() {
  const manifest = {
    name: "Ramigem CRM",
    short_name: "Ramigem",
    description: "Luxury Emerald CRM for Meir Harush",
    start_url: "./",
    display: "standalone",
    background_color: "#FFFFFF",
    theme_color: "#FFFFFF",
    orientation: "portrait",
    icons: [
      { src: "data:image/svg+xml;base64," + btoa('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" fill="#FFFFFF"/><text x="96" y="120" font-family="serif" font-size="72" text-anchor="middle" fill="#0A0A0A" font-weight="100" letter-spacing="8">R</text></svg>'), sizes: "192x192", type: "image/svg+xml" },
      { src: "data:image/svg+xml;base64," + btoa('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#FFFFFF"/><text x="256" y="320" font-family="serif" font-size="192" text-anchor="middle" fill="#0A0A0A" font-weight="100" letter-spacing="8">R</text></svg>'), sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

  if ('serviceWorker' in navigator) {
    // Unregister ALL old service workers to clear stale cache
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    });
    // Clear all caches
    if ('caches' in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
    const swCode = `
      const CACHE = 'ramigem-crm-v5';
      self.addEventListener('install', e => { self.skipWaiting(); });
      self.addEventListener('activate', e => e.waitUntil(
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => clients.claim())
      ));
      self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
    `;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], {type:'application/javascript'}))).catch(()=>{});
  }
})();

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function daysSince(isoDate) {
  if (!isoDate) return 999;
  return Math.floor((new Date() - new Date(isoDate)) / 86400000);
}

function formatDate(isoDate) {
  if (!isoDate) return '—';
  return new Date(isoDate).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function todayISO() { return new Date().toISOString().split('T')[0]; }

function greetingTime() {
  const h = new Date().getHours();
  return h < 12 ? 'Good Morning' : h < 17 ? 'Good Afternoon' : 'Good Evening';
}

function todayDate() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function initials(name) {
  return name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
}

function fmtMoney(v) {
  if (!v) return '';
  if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
  if (v >= 1000) return '$' + (v/1000).toFixed(0) + 'K';
  return '$' + v;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

function focusSearch() {
  const s = document.querySelector('.page.active .search-input');

}

/* Status dot HTML */
function dotHTML(status) {
  const map = {
    hot:'dot-hot', active:'dot-active', followup:'dot-followup', cold:'dot-cold',
    warm:'dot-warm', bounced:'dot-bounced', replied:'dot-replied',
    sent:'dot-sent', 'no reply':'dot-noreply', 'not sent':'dot-notsent'
  };
  return `<span class="status-dot ${map[(status||'cold').toLowerCase()] || 'dot-cold'}"></span>`;
}

function statusLabel(status) {
  const labels = {
    hot:'Hot', active:'Active', followup:'Follow Up', cold:'Cold',
    warm:'Warm', bounced:'Bounced', replied:'Replied',
    sent:'Sent', 'no reply':'No Reply', 'not sent':'Not Sent'
  };
  return labels[(status||'').toLowerCase()] || status;
}

function statusPillHTML(status) {
  return `<span class="status-pill">${dotHTML(status)}<span>${statusLabel(status)}</span></span>`;
}

let currentPage = 'dashboard';

function navigate(page) {
  if (currentPage === page) return;
  const oldEl = document.getElementById('page-' + currentPage);
  oldEl.classList.remove('visible');
  setTimeout(() => oldEl.classList.remove('active'), 220);

  currentPage = page;
  const newEl = document.getElementById('page-' + page);
  newEl.classList.add('active');
  requestAnimationFrame(() => requestAnimationFrame(() => newEl.classList.add('visible')));

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.page === page);
  });
  renderPage(page);
  newEl.scrollTop = 0;
}

function renderPage(page) {
  ({ dashboard:renderDashboard, clients:renderClients, leads:renderLeads,
     pipeline:renderPipeline, settings:renderSettings })[page]?.();
}

function addConvLog(id, text) {
  if(!convLogs[id]) convLogs[id]=[];
  convLogs[id].unshift({date:new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}),text});
  save('rami_conv',convLogs);
}

// ═══════════════════════════════════════════════════════════
// LEADS
// ═══════════════════════════════════════════════════════════
let leadFilter = 'all';
let leadSearch = '';

function renderLeads() {
  const el = document.getElementById('page-leads');
  const counts = {
    all: leads.length,
    hot: leads.filter(l=>l.priority==='hot').length,
    warm: leads.filter(l=>l.priority==='warm').length,
    cold: leads.filter(l=>l.priority==='cold').length,
    followup: leads.filter(l=>{const d=daysSince(l.lastContact);return d>=5;}).length
  };
  const filtered = leads.filter(l => {
    if(leadFilter==='hot') return l.priority==='hot';
    if(leadFilter==='warm') return l.priority==='warm';
    if(leadFilter==='cold') return l.priority==='cold';
    if(leadFilter==='followup'){const d=daysSince(l.lastContact);return d>=5;}
    return true;
  }).filter(l => {
    if(!leadSearch) return true;
    const q=leadSearch.toLowerCase();
    return (l.name||'').toLowerCase().includes(q)||(l.company||'').toLowerCase().includes(q)||(l.email||'').toLowerCase().includes(q);
  });

  const priorityColor={'hot':'var(--hot)','warm':'var(--followup)','cold':'var(--cold)'};
  const stageLabels={'new':'New Lead','contacted':'Contacted','discussion':'In Discussion','negotiation':'Negotiation','won':'Closed Won','lost':'Closed Lost'};

  el.innerHTML = `
    <div class="top-bar"><span class="brand">RAMIGEM</span><div class="top-icons"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div></div>
    <div class="hero-section">
      <div class="hero-img" style="background-image:url('https://meirharush10-blip.github.io/ramigem-catalogues/media/necklace_images/image1.jpeg'),linear-gradient(160deg,#1C3829,#2A5240)">
        <div class="hero-overlay"></div>
        <div class="hero-text">
          <div class="hero-label">SALES PIPELINE</div>
          <div class="hero-title">New Leads &amp;<br>Opportunities</div>
        </div>
      </div>
    </div>
    <div class="page-content">
      <div class="search-row">
        <input class="search-input" placeholder="Search leads…" value="${leadSearch}" oninput="leadSearch=this.value;renderLeads()">
      </div>
      <div class="tab-row">
        ${['all','hot','warm','cold','followup'].map(t=>`<button class="tab ${leadFilter===t?'active':''}" onclick="leadFilter='${t}';renderLeads()">${t==='followup'?'Follow-Up':t.charAt(0).toUpperCase()+t.slice(1)}${t!=='followup'?' ('+counts[t]+')':''}</button>`).join('')}
      </div>
      <div class="section-header"><div class="section-label">CONTACTS</div></div>
      <div class="contact-list">
        ${filtered.length===0?'<div style="padding:32px 20px;text-align:center;color:var(--text-muted);font-size:13px">No leads found</div>':
          filtered.map(l=>`
            <div class="contact-row" onclick="openLeadModal('${l.id}')">
              <div class="contact-main">
                <div class="contact-name">${l.name}</div>
                <div class="contact-company">${l.company||''}</div>
                <div class="contact-meta">${l.email||''}</div>
              </div>
              <div class="contact-right">
                <span class="status-dot" style="background:${priorityColor[l.priority]||'#999'}"></span>
                <div class="contact-days">${daysSince(l.lastContact)}d</div>
                <div class="view-arrow">→</div>
              </div>
            </div>`).join('')}
      </div>
      <div style="padding:20px">
        <button class="btn btn-primary btn-full" onclick="openNewLeadModal()">+ ADD NEW LEAD</button>
      </div>
    </div>`;
}

function openLeadModal(id) {
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  const logs = convLogs[id]||[];
  const stageLabels={'new':'New Lead','contacted':'Contacted','discussion':'In Discussion','negotiation':'Negotiation','won':'Closed Won','lost':'Closed Lost'};
  const stages = ['new','contacted','discussion','negotiation','won','lost'];

  document.getElementById('modal-lead-title').textContent = l.name;
  document.getElementById('modal-lead-body').innerHTML = `
    <div class="modal-meta-row">
      <span class="status-pill priority-${l.priority}">${l.priority.toUpperCase()}</span>
      <span class="status-pill">${stageLabels[l.pipelineStage]||l.pipelineStage}</span>
      <span class="status-pill">${l.emailStatus||'Not Sent'}</span>
    </div>
    <div class="grid-2">
      <div class="field-group"><div class="field-label">Company</div><div class="field-value">${l.company||'—'}</div></div>
      <div class="field-group"><div class="field-label">Role</div><div class="field-value">${l.role||'—'}</div></div>
    </div>
    <div class="grid-2">
      <div class="field-group"><div class="field-label">Email</div><a href="mailto:${l.email}" class="field-link">${l.email||'—'}</a></div>
      <div class="field-group"><div class="field-label">Phone</div><a href="tel:${l.phone}" class="field-link">${l.phone||'—'}</a></div>
    </div>
    <div class="field-group">
      <div class="field-label">Pipeline Stage</div>
      <select class="field-input" onchange="updateLead('${id}','pipelineStage',this.value)">
        ${stages.map(s=>`<option value="${s}" ${l.pipelineStage===s?'selected':''}>${stageLabels[s]}</option>`).join('')}
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">Priority</div>
      <select class="field-input" onchange="updateLead('${id}','priority',this.value)">
        ${['hot','warm','cold'].map(p=>`<option value="${p}" ${l.priority===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">Email Status</div>
      <select class="field-input" onchange="updateLead('${id}','emailStatus',this.value)">
        ${['Not Sent','Sent','Opened','No Reply','Replied','Bounced'].map(s=>`<option ${l.emailStatus===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">Last Contact</div>
      <input type="date" class="field-input" value="${l.lastContact||''}" onchange="updateLead('${id}','lastContact',this.value)">
    </div>
    <div class="field-group">
      <div class="field-label">Notes</div>
      <textarea class="field-textarea" onchange="updateLead('${id}','notes',this.value)">${l.notes||''}</textarea>
    </div>
    <div class="field-group">
      <div class="field-label">Conversation Log</div>
      <div class="conv-log" id="conv-log-${id}">
        ${logs.length===0?'<div class="conv-text" style="color:var(--text-muted);padding:8px 0">No entries yet</div>':logs.map(e=>`<div class="conv-entry"><div class="conv-date">${e.date}</div><div class="conv-text">${e.text}</div></div>`).join('')}
      </div>
      <textarea class="field-textarea" id="new-log-${id}" placeholder="Add a note…" style="margin-top:10px;min-height:56px"></textarea>
      <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="addLog('${id}','lead')">Add Entry</button>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-primary" style="flex:1" onclick="logContactFull('${id}','lead')">Log Contact</button>
      <button class="btn btn-ghost" style="flex:1;border-color:#8B2020;color:#8B2020" onclick="markBounced('${id}')">Mark Bounced</button>
    </div>`;
  openModal('modal-lead');
}

function updateLead(id, field, value) {
  const l=leads.find(x=>x.id===id);
  if(l){l[field]=value;save('rami_leads',leads);}
}

function markBounced(id) {
  updateLead(id,'emailStatus','Bounced');
  updateLead(id,'pipelineStage','lost');
  toast('Marked as bounced');
  closeModal('modal-lead');
  renderLeads();
}

function openNewLeadModal() {
  document.getElementById('modal-newlead-body').innerHTML = `
    <div class="field-group"><div class="field-label">Name *</div><input class="field-input" id="nl-name" placeholder="Full name"></div>
    <div class="field-group"><div class="field-label">Company</div><input class="field-input" id="nl-company" placeholder="Company name"></div>
    <div class="field-group"><div class="field-label">Email</div><input class="field-input" id="nl-email" type="email" placeholder="email@company.com"></div>
    <div class="field-group"><div class="field-label">Phone</div><input class="field-input" id="nl-phone" placeholder="+1 212..."></div>
    <div class="field-group"><div class="field-label">City</div><input class="field-input" id="nl-city" placeholder="New York"></div>
    <div class="field-group"><div class="field-label">Country</div><input class="field-input" id="nl-country" placeholder="USA"></div>
    <div class="field-group"><div class="field-label">Priority</div>
      <select class="field-input" id="nl-priority"><option value="warm">Warm</option><option value="hot">Hot</option><option value="cold">Cold</option></select>
    </div>
    <div class="field-group"><div class="field-label">Notes</div><textarea class="field-textarea" id="nl-notes" placeholder="How did you meet? What do they need?"></textarea></div>
    <div style="margin-top:16px">
      <button class="btn btn-primary btn-full" onclick="saveNewLead()">SAVE LEAD</button>
    </div>`;
  openModal('modal-newlead');
}

function saveNewLead() {
  const name=document.getElementById('nl-name').value.trim();
  if(!name){toast('Name is required');return;}
  const newLead = {
    id:'lead-'+Date.now(),
    name,
    company:document.getElementById('nl-company').value.trim(),
    email:document.getElementById('nl-email').value.trim(),
    phone:document.getElementById('nl-phone').value.trim(),
    city:document.getElementById('nl-city').value.trim(),
    country:document.getElementById('nl-country').value.trim(),
    priority:document.getElementById('nl-priority').value,
    notes:document.getElementById('nl-notes').value.trim(),
    pipelineStage:'new',
    emailStatus:'Not Sent',
    lastContact:todayISO(),
    source:'Manual Entry'
  };
  leads.unshift(newLead);
  save('rami_leads',leads);
  closeModal('modal-newlead');
  renderLeads();
  toast('Lead saved');
}

// PIPELINE

function renderPipeline() {
  const el=document.getElementById('page-pipeline');
  const stages=[
    {id:'new',label:'New Lead'},
    {id:'contacted',label:'Contacted'},
    {id:'discussion',label:'In Discussion'},
    {id:'negotiation',label:'Negotiation'},
    {id:'won',label:'Closed Won'},
    {id:'lost',label:'Closed Lost'}
  ];
  const all=[...clients.map(c=>({...c,_type:'client'})),...leads.map(l=>({...l,_type:'lead'}))];

  el.innerHTML=`
    <div class="top-bar"><span class="brand">RAMIGEM</span></div>
    <div class="hero-section">
      <div class="hero-img" style="background-image:url('https://meirharush10-blip.github.io/ramigem-catalogues/media/ring_images/image3.jpeg'),linear-gradient(160deg,#1C3829,#2A5240)">
        <div class="hero-overlay"></div>
        <div class="hero-text">
          <div class="hero-label">SALES OVERVIEW</div>
          <div class="hero-title">Pipeline<br>Tracker</div>
        </div>
      </div>
    </div>
    <div class="page-content">
      ${stages.map(s=>{
        const items=all.filter(x=>x.pipelineStage===s.id);
        const val=items.reduce((a,x)=>a+(x.dealValue||0),0);
        return `<div class="pipeline-stage">
          <div class="pipeline-header">
            <span class="section-label">${s.label}</span>
            <span style="font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold)">${items.length} · ${fmtMoney(val)}</span>
          </div>
          ${items.length===0?'<div style="color:var(--text-muted);font-size:12px;padding:8px 0;letter-spacing:0.08em">—</div>':
            items.map(x=>`<div class="pipeline-card" onclick="x._type==='client'?openClientModal('${x.id}'):openLeadModal('${x.id}')">
              <div style="font-family:'Cormorant Garamond',serif;font-size:17px">${x.name}</div>
              <div style="font-size:11px;color:var(--text-muted);letter-spacing:0.08em;margin-top:2px">${x.company||''}</div>
            </div>`).join('')}
        </div>`;
      }).join('')}
    </div>`;
}

function renderSettings() {
  const el=document.getElementById('page-settings');
  el.innerHTML=`
    <div class="top-bar"><span class="brand">RAMIGEM</span></div>
    <div class="page-content" style="padding-top:40px">
      <div class="section-header"><div class="section-label">DATA MANAGEMENT</div></div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:16px">
        <button class="btn btn-primary btn-full" onclick="exportData()">EXPORT ALL DATA (JSON)</button>
        <button class="btn btn-ghost btn-full" onclick="document.getElementById('import-file').click()">IMPORT DATA (JSON)</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
        <button class="btn btn-ghost btn-full" style="border-color:#8B2020;color:#8B2020" onclick="confirmClear()">CLEAR ALL DATA</button>
      </div>
      <div class="section-header" style="margin-top:40px"><div class="section-label">APP INFO</div></div>
      <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">
        <div class="field-group"><div class="field-label">Version</div><div class="field-value">2.0 · Graff Edition</div></div>
        <div class="field-group"><div class="field-label">Clients Loaded</div><div class="field-value" style="font-family:'Cormorant Garamond',serif;font-size:20px">${clients.length}</div></div>
        <div class="field-group"><div class="field-label">Leads Loaded</div><div class="field-value" style="font-family:'Cormorant Garamond',serif;font-size:20px">${leads.length}</div></div>
        <div class="field-group"><div class="field-label">Built for</div><div class="field-value">Meir Harush · Ramigem NY</div></div>
      </div>
    </div>`;
}

function exportData() {
  const data={clients,leads,tasks,convLogs,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='ramigem-crm-export.json';a.click();
  URL.revokeObjectURL(url);
  toast('Data exported');
}

function importData(input) {
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.clients) {clients=data.clients;save('rami_clients',clients);}
      if(data.leads) {leads=data.leads;save('rami_leads',leads);}
      if(data.tasks) {tasks=data.tasks;save('rami_tasks',tasks);}
      if(data.convLogs) {convLogs=data.convLogs;save('rami_conv',convLogs);}
      toast('Data imported successfully');
      showPage('dashboard');
    }catch(err){toast('Invalid JSON file');}
  };
  reader.readAsText(file);
}

function confirmClear() {
  if(confirm('Clear all data? This cannot be undone.')) {
    localStorage.removeItem('rami_clients');
    localStorage.removeItem('rami_leads');
    localStorage.removeItem('rami_tasks');
    localStorage.removeItem('rami_conv');
    location.reload();
  }
}

  // Boot — render dashboard first, then show it
  renderDashboard();
  const dashEl = document.getElementById('page-dashboard');
  dashEl.classList.add('active');
  setTimeout(() => dashEl.classList.add('visible'), 30);
  // PWA install prompt
  window.addEventListener('beforeinstallprompt', e => { window._deferredPrompt = e; });
});
</script>
