<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #ede5db;
  color: #2b2118;
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 56px 20px 40px;
}
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 54px;
  font-weight: 300;
  letter-spacing: 0.22em;
  margin-bottom: 6px;
}
.tagline {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 12px;
}
.divider {
  width: 60px;
  height: 1px;
  background: #2b2118;
  opacity: 0.25;
  margin: 0 auto 52px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 1040px;
}
.card {
  text-decoration: none;
  color: #2b2118;
  background: #f5ede3;
  border: 1px solid #d6c9b8;
  overflow: hidden;
  transition: transform 0.25s, box-shadow 0.25s;
  display: flex;
  flex-direction: column;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(43,33,24,0.12);
}
.card-img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  object-position: center;
  display: block;
  border-bottom: 1px solid #d6c9b8;
  background: #e8ddd1;
}
.card-body {
  padding: 24px 22px 20px;
  text-align: center;
}
.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 400;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.card-sub {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 14px;
}
.card-cta {
  display: inline-block;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(43,33,24,0.35);
  padding-bottom: 2px;
  opacity: 0.65;
}
.footer {
  margin-top: 60px;
  font-size: 10px;
  opacity: 0.4;
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 2;
}
</style>
