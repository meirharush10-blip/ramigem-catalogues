<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#FAFAF7;font-family:'Inter',sans-serif;color:#2C2C2C;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;}

/* HEADER */
.app-header{background:#FAFAF7;border-bottom:1px solid #E8E3D8;padding:14px 20px 10px;text-align:center;flex-shrink:0;}
.app-header h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;letter-spacing:0.2em;color:#1C3829;}
.app-header .page-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;letter-spacing:0.1em;color:#1C3829;margin-top:2px;}

/* CONTENT */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:16px 16px 8px;}

/* NAV */
#nav{background:#fff;border-top:1px solid #E8E3D8;display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:10px;font-weight:400;color:#999;gap:4px;position:relative;}
.nav-btn svg{width:20px;height:20px;stroke:#999;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.nav-btn.active{color:#1C3829;}
.nav-btn.active svg{stroke:#1C3829;}
.nav-btn.active::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:#C9A84C;}

/* CARDS & SECTIONS */
.section-label{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#999;margin:16px 0 8px;}
.divider{border:none;border-top:1px solid #E8E3D8;margin:12px 0;}
.card{border:1px solid #E8E3D8;border-radius:3px;background:#fff;margin-bottom:8px;padding:14px;}
.row-item{border:1px solid #E8E3D8;border-radius:3px;background:#fff;margin-bottom:6px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.row-item:active{background:#F5F0E8;}

/* STATUS DOTS */
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-hot{background:#C9A84C;}
.dot-active{background:#2E7D52;}
.dot-followup{background:#E8A020;}
.dot-cold{background:#999;}
.dot-warm{background:#E8A020;}

/* STATUS BADGES */
.badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:2px;}
.badge-hot{background:#FDF4E0;color:#C9A84C;}
.badge-active{background:#E8F5EE;color:#2E7D52;}
.badge-followup{background:#FEF3E0;color:#E8A020;}
.badge-cold{background:#F0F0F0;color:#888;}
.badge-warm{background:#FEF3E0;color:#E8A020;}
.badge-replied{background:#E8F5EE;color:#2E7D52;}
.badge-noreply{background:#F0F0F0;color:#888;}
.badge-notsent{background:#F0F0F0;color:#888;}

/* DASHBOARD */
.greeting{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:#1C3829;margin-bottom:2px;}
.today-date{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:16px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px;}
.stat-box{border:1px solid #E8E3D8;border-radius:3px;background:#fff;padding:10px 6px;text-align:center;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:#1C3829;line-height:1;}
.stat-lbl{font-size:9px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#999;margin-top:4px;}

/* FOLLOW-UP ROWS */
.fu-row{border-left:3px solid #C9A84C;background:#fff;border-radius:0 3px 3px 0;border-top:1px solid #E8E3D8;border-right:1px solid #E8E3D8;border-bottom:1px solid #E8E3D8;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.fu-row.overdue{border-left-color:#8B2020;}
.fu-info{flex:1;min-width:0;}
.fu-name{font-size:13px;font-weight:500;color:#2C2C2C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fu-company{font-size:11px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fu-days{font-size:11px;color:#888;white-space:nowrap;flex-shrink:0;}
.call-btn{background:#1C3829;color:#fff;border:none;border-radius:3px;padding:6px 12px;font-size:11px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;text-decoration:none;display:inline-block;}
.call-btn:active{background:#152e20;}

/* TASKS */
.task-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #E8E3D8;}
.task-row:last-child{border-bottom:none;}
.task-check{width:18px;height:18px;border:1.5px solid #E8E3D8;border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.task-check.checked{background:#1C3829;border-color:#1C3829;}
.task-check.checked::after{content:'✓';color:#fff;font-size:11px;line-height:1;}
.task-text{flex:1;font-size:13px;color:#2C2C2C;}
.task-text.done{text-decoration:line-through;color:#999;}
.task-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 4px;}
.add-task-row{display:flex;gap:8px;margin-top:10px;}
.add-task-row input{flex:1;border:1px solid #E8E3D8;border-radius:3px;padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none;color:#2C2C2C;}
.add-task-row input:focus{border-color:#C9A84C;}
.add-task-row button{background:#1C3829;color:#fff;border:none;border-radius:3px;padding:9px 14px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;}

/* SEARCH & FILTERS */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{width:100%;border:1px solid #E8E3D8;border-radius:3px;padding:10px 12px 10px 36px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none;color:#2C2C2C;}
.search-wrap input:focus{border-color:#C9A84C;}
.search-wrap::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:16px;color:#ccc;}
.filter-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{border:1px solid #E8E3D8;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;background:#fff;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.ftab.active{background:#1C3829;color:#fff;border-color:#1C3829;}

/* CLIENT ROW */
.client-left{flex:1;min-width:0;}
.client-name{font-size:14px;font-weight:500;color:#2C2C2C;}
.client-company{font-size:12px;color:#999;margin-top:1px;}
.client-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.days-txt{font-size:11px;color:#999;}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;}
#modal-box{position:absolute;bottom:0;left:0;right:0;background:#FAFAF7;border-radius:16px 16px 0 0;max-height:85vh;overflow-y:auto;max-width:480px;margin:0 auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid #E8E3D8;position:sticky;top:0;background:#FAFAF7;z-index:1;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:#1C3829;}
.modal-close{background:none;border:none;font-size:22px;color:#999;cursor:pointer;padding:0 4px;line-height:1;}
.modal-body{padding:16px;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #E8E3D8;gap:12px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#999;flex-shrink:0;}
.detail-value{font-size:13px;color:#2C2C2C;text-align:right;word-break:break-word;}
.detail-value a{color:#1C3829;text-decoration:none;}
.notes-area{width:100%;border:1px solid #E8E3D8;border-radius:3px;padding:10px 12px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;resize:vertical;min-height:80px;outline:none;color:#2C2C2C;margin-top:8px;}
.notes-area:focus{border-color:#C9A84C;}
.btn-primary{background:#1C3829;color:#fff;border:none;border-radius:3px;padding:12px 20px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-top:10px;}
.btn-primary:active{background:#152e20;}
.btn-secondary{background:#fff;color:#1C3829;border:1px solid #1C3829;border-radius:3px;padding:11px 20px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-top:8px;}
.btn-danger{background:#fff;color:#8B2020;border:1px solid #8B2020;border-radius:3px;padding:11px 20px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-top:8px;}
.stage-select{width:100%;border:1px solid #E8E3D8;border-radius:3px;padding:10px 12px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;color:#2C2C2C;outline:none;margin-top:8px;}
.stage-select:focus{border-color:#C9A84C;}
.log-entry{padding:8px 0;border-bottom:1px solid #E8E3D8;font-size:12px;color:#666;}
.log-entry:last-child{border-bottom:none;}
.log-date{font-weight:500;color:#1C3829;font-size:11px;}

/* PIPELINE */
.pipeline-stage{margin-bottom:16px;}
.pipeline-stage-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.pipeline-stage-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:#1C3829;}
.pipeline-count{background:#E8E3D8;color:#666;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
.pipeline-item{border:1px solid #E8E3D8;border-radius:3px;background:#fff;padding:10px 14px;margin-bottom:6px;}
.pipeline-item-name{font-size:13px;font-weight:500;color:#2C2C2C;}
.pipeline-item-meta{font-size:11px;color:#999;margin-top:2px;}
.pipeline-item-value{font-size:12px;font-weight:500;color:#C9A84C;margin-top:4px;}

/* SETTINGS */
.settings-section{margin-bottom:20px;}
.settings-btn{border:1px solid #E8E3D8;border-radius:3px;background:#fff;padding:14px 16px;width:100%;text-align:left;font-size:14px;font-family:'Inter',sans-serif;color:#2C2C2C;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.settings-btn:active{background:#F5F0E8;}
.settings-btn.danger{color:#8B2020;border-color:#f0d0d0;}
.settings-btn span.icon{font-size:18px;}
.version-text{text-align:center;font-size:11px;color:#ccc;padding:20px 0 8px;letter-spacing:0.05em;}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1C3829;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-family:'Inter',sans-serif;opacity:0;transition:opacity 0.3s;z-index:2000;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ADD LEAD FORM */
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#999;margin-bottom:4px;display:block;}
.form-input{width:100%;border:1px solid #E8E3D8;border-radius:3px;padding:10px 12px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none;color:#2C2C2C;}
.form-input:focus{border-color:#C9A84C;}
.form-select{width:100%;border:1px solid #E8E3D8;border-radius:3px;padding:10px 12px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;color:#2C2C2C;outline:none;}
.form-select:focus{border-color:#C9A84C;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:#bbb;font-size:14px;}

/* PIPELINE LINE */
.pipeline-connector{width:2px;height:16px;background:#E8E3D8;margin:0 auto 0 19px;}
</style>
</head>

function save(key, val) {

}

// ============================================================
// HELPERS
// ============================================================
function daysSince(d) {
  if (!d) return 999;
  return Math.floor((Date.now() - new Date(d)) / 86400000);
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function fmtMoney(v) {
  if (!v) return '—';
  return '$' + Number(v).toLocaleString();
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
}

function greetingWord() {
  var h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function todayFmt() {
  return new Date().toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'}).toUpperCase();
}

function statusDotClass(status) {
  if (status === 'hot') return 'dot-hot';
  if (status === 'active') return 'dot-active';
  if (status === 'followUp') return 'dot-followup';
  if (status === 'cold') return 'dot-cold';
  if (status === 'warm') return 'dot-warm';
  return 'dot-cold';
}

function statusBadge(status) {
  var map = {
    hot: ['badge-hot','HOT'],
    active: ['badge-active','ACTIVE'],
    followUp: ['badge-followup','FOLLOW UP'],
    cold: ['badge-cold','COLD'],
    warm: ['badge-warm','WARM']
  };
  var m = map[status] || ['badge-cold', status];
  return '<span class="badge ' + m[0] + '">' + m[1] + '</span>';
}

function priorityBadge(p) {
  var map = {hot:['badge-hot','HOT'],warm:['badge-warm','WARM'],cold:['badge-cold','COLD']};
  var m = map[p] || ['badge-cold',p];
  return '<span class="badge ' + m[0] + '">' + m[1] + '</span>';
}

function emailBadge(s) {
  if (s === 'Replied') return '<span class="badge badge-replied">REPLIED</span>';
  if (s === 'No Reply') return '<span class="badge badge-noreply">NO REPLY</span>';
  return '<span class="badge badge-notsent">NOT SENT</span>';
}

function stageName(s) {
  var map = {
    new: 'New Lead',
    contacted: 'Contacted',
    discussion: 'In Discussion',
    negotiation: 'Negotiation',
    won: 'Closed Won',
    lost: 'Closed Lost'
  };
  return map[s] || s;
}

function uniqueId(prefix) {
  return prefix + Date.now() + Math.random().toString(36).substr(2,5);
}

  save('rc_tasks', tasks);
  renderDashboard();

function addTask() {

  tasks.push({id: uniqueId('t'), text: text, done: false, priority: 'normal'});

function logContactAndSave(id, type) {
  var noteEl, stageEl, notesVal, stageVal;
  if (type === 'client') {
    noteEl = document.getElementById('modal-notes-' + id);
    stageEl = document.getElementById('modal-stage-' + id);
    notesVal = noteEl ? noteEl.value : '';
    stageVal = stageEl ? stageEl.value : '';

    clients.forEach(function(c) {
      if (c.id === id) {
        c.lastContact = todayISO();
        c.notes = notesVal;
        c.pipelineStage = stageVal;
      }
    });
    save('rc_clients', clients);

    if (!convLogs[id]) convLogs[id] = [];
    convLogs[id].push({date: todayISO(), note: 'Contact logged'});
    save('rc_conv', convLogs);

  } else if (type === 'lead') {
    noteEl = document.getElementById('modal-notes-' + id);
    stageEl = document.getElementById('modal-stage-' + id);
    var emailEl = document.getElementById('modal-email-status-' + id);
    notesVal = noteEl ? noteEl.value : '';
    stageVal = stageEl ? stageEl.value : '';
    var emailVal = emailEl ? emailEl.value : '';

    leads.forEach(function(l) {
      if (l.id === id) {
        l.lastContact = todayISO();
        l.notes = notesVal;
        l.pipelineStage = stageVal;
        if (emailVal) l.emailStatus = emailVal;
      }
    });
    save('rc_leads', leads);

    if (!convLogs[id]) convLogs[id] = [];
    convLogs[id].push({date: todayISO(), note: 'Contact logged'});
    save('rc_conv', convLogs);
  }

  closeModal();
  toast('Contact logged!');

  if (currentPage === 'clients') renderClients();
  else if (currentPage === 'leads') renderLeads();
  else if (currentPage === 'dashboard') renderDashboard();
}

    '<button class="btn-primary" onclick="logContactAndSave(\'' + esc(l.id) + '\',\'lead\')">✓ Log Contact Today</button>' +

    '<div class="section-label" style="margin-top:14px;">Contact History</div>' +
    '<div style="background:#fff;border:1px solid #E8E3D8;border-radius:3px;padding:0 14px;">' + logsHtml + '</div>' +

    '<button class="btn-danger" onclick="deleteLead(\'' + esc(l.id) + '\')">Delete Lead</button>' +

    '</div>';

  showModal(html);
}

function openAddLeadModal() {
  var html =
    '<div class="modal-header">' +
    '<div class="modal-title">New Lead</div>' +
    '<button class="modal-close" onclick="closeModal()">×</button>' +
    '</div>' +
    '<div class="modal-body">' +
    '<div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="nl-name" placeholder="Contact name"></div>' +
    '<div class="form-group"><label class="form-label">Company</label><input class="form-input" id="nl-company" placeholder="Company name"></div>' +
    '<div class="form-group"><label class="form-label">Email</label><input class="form-input" id="nl-email" type="email" placeholder="email@company.com"></div>' +
    '<div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="nl-phone" type="tel" placeholder="+1 ..."></div>' +
    '<div class="form-group"><label class="form-label">City</label><input class="form-input" id="nl-city" placeholder="City"></div>' +
    '<div class="form-group"><label class="form-label">Country</label><input class="form-input" id="nl-country" placeholder="Country"></div>' +
    '<div class="form-group"><label class="form-label">Priority</label><select class="form-select" id="nl-priority"><option value="hot">Hot</option><option value="warm" selected>Warm</option><option value="cold">Cold</option></select></div>' +
    '<div class="form-group"><label class="form-label">Source</label><input class="form-input" id="nl-source" placeholder="Campaign 1, Referral..."></div>' +
    '<div class="form-group"><label class="form-label">Deal Value ($)</label><input class="form-input" id="nl-value" type="number" placeholder="0"></div>' +
    '<div class="form-group"><label class="form-label">Notes</label><textarea class="notes-area" id="nl-notes" placeholder="Initial notes..."></textarea></div>' +
    '<button class="btn-primary" onclick="saveNewLead()">Add Lead</button>' +
    '</div>';
  showModal(html);
}

function saveNewLead() {
  var name = document.getElementById('nl-name').value.trim();
  if (!name) { toast('Name is required'); return; }
  var lead = {
    id: uniqueId('l'),
    name: name,
    company: document.getElementById('nl-company').value.trim(),
    email: document.getElementById('nl-email').value.trim(),
    phone: document.getElementById('nl-phone').value.trim(),
    city: document.getElementById('nl-city').value.trim(),
    country: document.getElementById('nl-country').value.trim(),
    priority: document.getElementById('nl-priority').value,
    pipelineStage: 'new',
    emailStatus: 'Not Sent',
    lastContact: todayISO(),
    notes: document.getElementById('nl-notes').value.trim(),
    source: document.getElementById('nl-source').value.trim(),
    dealValue: parseInt(document.getElementById('nl-value').value) || 0
  };
  leads.push(lead);
  save('rc_leads', leads);
  closeModal();
  toast('Lead added!');
  renderLeads();
}

function deleteLead(id) {
  if (!confirm('Delete this lead?')) return;
  leads = leads.filter(function(l) { return l.id !== id; });
  save('rc_leads', leads);
  closeModal();
  toast('Lead deleted');
  renderLeads();
}

// ============================================================
// PIPELINE
// ============================================================
function renderPipeline() {
  var el = document.getElementById('page-pipeline');

  var stages = ['new','contacted','discussion','negotiation','won','lost'];
  var allItems = clients.map(function(c) { return {name:c.name,company:c.company,stage:c.pipelineStage,value:c.dealValue,type:'client'}; })
    .concat(leads.map(function(l) { return {name:l.name,company:l.company,stage:l.pipelineStage,value:l.dealValue,type:'lead'}; }));

  var html = '';
  stages.forEach(function(stage, idx) {
    var items = allItems.filter(function(x) { return x.stage === stage; });
    var stageColor = stage === 'won' ? '#2E7D52' : stage === 'lost' ? '#8B2020' : '#1C3829';

    html += '<div class="pipeline-stage">';
    html += '<div class="pipeline-stage-header">';
    html += '<div class="pipeline-stage-name" style="color:' + stageColor + ';">' + stageName(stage) + '</div>';
    html += '<div class="pipeline-count">' + items.length + '</div>';
    html += '</div>';

    if (items.length === 0) {
      html += '<div style="color:#bbb;font-size:12px;padding:6px 0 4px;">—</div>';
    } else {
      items.forEach(function(item) {
        html += '<div class="pipeline-item">' +
          '<div class="pipeline-item-name">' + esc(item.name) + '</div>' +
          '<div class="pipeline-item-meta">' + esc(item.company) + ' · ' + (item.type === 'lead' ? 'Lead' : 'Client') + '</div>' +
          (item.value ? '<div class="pipeline-item-value">' + fmtMoney(item.value) + '</div>' : '') +
          '</div>';
      });
    }

    html += '</div>';
    if (idx < stages.length - 1) {
      html += '<div class="pipeline-connector"></div>';
    }
  });

  // Total pipeline value
  var totalVal = allItems.filter(function(x) { return x.stage !== 'lost'; }).reduce(function(sum, x) { return sum + (x.value || 0); }, 0);
  html += '<hr class="divider"><div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 8px;">' +
    '<span style="font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#999;">Total Pipeline</span>' +
    '<span style="font-size:16px;font-weight:500;color:#C9A84C;">' + fmtMoney(totalVal) + '</span>' +
    '</div>';

  var IMG_BASE = 'https://meirharush10-blip.github.io/ramigem-catalogues/media';
  el.innerHTML =
    '<div style="width:100%;height:160px;background-image:url('+IMG_BASE+'/hero/bracelet.jpg);background-size:cover;background-position:center;position:relative;">' +
    '<div style="position:absolute;inset:0;background:rgba(0,0,0,0.35);"></div>' +
    '<div style="position:absolute;bottom:16px;left:20px;color:#fff;font-family:Cormorant Garamond,serif;font-size:24px;font-weight:300;">Pipeline</div>' +
    '</div>' +
    '<div style="padding:16px;">' + html + '</div>';
}

function exportData() {
  var data = {
    version: 3,
    exported: new Date().toISOString(),
    clients: clients,
    leads: leads,
    tasks: tasks,
    convLogs: convLogs
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'ramigem-crm-backup-' + todayISO() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Data exported!');
}

function importData() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (data.clients) { clients = data.clients; save('rc_clients', clients); }
        if (data.leads) { leads = data.leads; save('rc_leads', leads); }
        if (data.tasks) { tasks = data.tasks; save('rc_tasks', tasks); }
        if (data.convLogs) { convLogs = data.convLogs; save('rc_conv', convLogs); }
        toast('Data imported!');
        renderSettings();
      } catch(err) {
        toast('Invalid file');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearData() {
  if (!confirm('Clear ALL data? This cannot be undone.')) return;
  clients = JSON.parse(JSON.stringify(DEFAULT_CLIENTS));
  leads = JSON.parse(JSON.stringify(DEFAULT_LEADS));
  tasks = [{id:'t1',text:'Follow up Artcurial Paris — finished jewelry angle',done:false,priority:'high'},{id:'t2',text:'Call hottest contacts this week',done:false,priority:'high'}];
  convLogs = {};
  meetings = 3;
  save('rc_clients', clients);
  save('rc_leads', leads);
  save('rc_tasks', tasks);
  save('rc_conv', convLogs);
  save('rc_meetings', meetings);
  toast('Data reset to defaults');
  renderSettings();
}

// PWA INSTALL
// ============================================================
window._deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  window._deferredPrompt = e;
});
function installPWA() {
  if (!window._deferredPrompt) { toast('Use Safari: Share → Add to Home Screen'); return; }
  window._deferredPrompt.prompt();
  window._deferredPrompt.userChoice.then(function() { window._deferredPrompt = null; renderSettings(); });
}
