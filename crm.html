<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ramigem CRM</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ramigem">
<meta name="theme-color" content="#2D5A3D">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#F2EDE4;font-family:'Inter',sans-serif;color:#1A2E1F;overflow:hidden;}

/* ── LAYOUT ── */
#app{display:flex;height:100%;max-width:480px;margin:0 auto;position:relative;}
#sidebar{width:260px;background:#2D5A3D;flex-shrink:0;display:flex;flex-direction:column;padding:20px 16px 32px;transform:translateX(-260px);transition:transform 0.25s ease;position:absolute;left:0;top:0;bottom:0;z-index:200;}
#sidebar.open{transform:translateX(0);}
#sidebar-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:199;}
#sidebar-overlay.show{display:block;}
#main{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;}

/* ── TOPBAR ── */
#topbar{background:#F2EDE4;padding:14px 16px 10px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid #DDD6C8;}
.menu-btn{background:none;border:1px solid #DDD6C8;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.menu-btn svg{width:18px;height:18px;stroke:#2D5A3D;fill:none;stroke-width:1.8;stroke-linecap:round;}
.topbar-title{flex:1;}
.topbar-label{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#8A7E6E;font-weight:500;}
.topbar-page{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:#1A2E1F;line-height:1.1;}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;}

/* ── SIDEBAR STYLES ── */
.sidebar-brand{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.sidebar-gem{width:32px;height:32px;background:#3D7A52;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.sidebar-gem svg{width:16px;height:16px;fill:#A8D5B0;}
.sidebar-brand-name{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.12em;color:#E8F0EA;}

.sidebar-workspace{background:rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:20px;}
.sidebar-ws-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:#8FC49A;margin-bottom:4px;}
.sidebar-ws-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:#fff;line-height:1.1;}
.sidebar-ws-desc{font-size:11px;color:#8FC49A;margin-top:6px;line-height:1.5;}

.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:4px;}
.snav-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:400;color:#C5DEC9;border:none;background:none;font-family:'Inter',sans-serif;width:100%;text-align:left;transition:background 0.15s;}
.snav-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;flex-shrink:0;}
.snav-item.active{background:rgba(255,255,255,0.14);color:#fff;font-weight:500;}
.snav-item:active{background:rgba(255,255,255,0.1);}

.sidebar-user{background:rgba(255,255,255,0.08);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;margin-top:auto;}
.sidebar-avatar{width:36px;height:36px;border-radius:50%;background:#3D7A52;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#E8F0EA;flex-shrink:0;}
.sidebar-user-name{font-size:13px;font-weight:500;color:#fff;}
.sidebar-user-email{font-size:11px;color:#8FC49A;margin-top:1px;}

/* ── HOME PAGE ── */
.home-pad{padding:16px;}
.hero-card{background:linear-gradient(135deg,#1A3E28 0%,#2D5A3D 100%);border-radius:16px;overflow:hidden;margin-bottom:16px;height:180px;display:flex;align-items:center;justify-content:center;position:relative;}
.hero-gem{width:120px;height:120px;background:rgba(255,255,255,0.95);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.hero-gem-inner{font-size:64px;line-height:1;}
.hero-tagline{position:absolute;bottom:14px;left:16px;right:16px;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.5);}

.section-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #E8E1D8;}
.section-card-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#8A7E6E;font-weight:500;margin-bottom:6px;}
.section-card-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:#1A2E1F;margin-bottom:8px;}
.section-card-desc{font-size:13px;color:#7A6E5E;line-height:1.5;}

.search-box{display:flex;align-items:center;gap:8px;background:#F8F5F0;border:1px solid #DDD6C8;border-radius:24px;padding:10px 16px;margin-top:12px;cursor:pointer;}
.search-box svg{width:16px;height:16px;stroke:#9A8E7E;fill:none;stroke-width:1.8;flex-shrink:0;}
.search-box span{font-size:13px;color:#9A8E7E;}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:#fff;border-radius:12px;padding:14px;border:1px solid #E8E1D8;cursor:pointer;}
.stat-card:active{background:#F5F0E8;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:#1A2E1F;line-height:1;}
.stat-lbl{font-size:11px;color:#8A7E6E;margin-top:4px;font-weight:500;}

/* Follow-up rows */
.fu-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F0EBE0;}
.fu-item:last-child{border-bottom:none;}
.fu-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fu-info{flex:1;min-width:0;}
.fu-name{font-size:13px;font-weight:500;color:#1A2E1F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fu-co{font-size:11px;color:#9A8E7E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.fu-days{font-size:11px;color:#9A8E7E;white-space:nowrap;flex-shrink:0;}
.call-btn{background:#2D5A3D;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;text-decoration:none;display:inline-block;}

/* Tasks */
.task-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F0EBE0;}
.task-row:last-child{border-bottom:none;}
.task-check{width:18px;height:18px;border:1.5px solid #C8C0B0;border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.task-check.checked{background:#2D5A3D;border-color:#2D5A3D;}
.task-check.checked::after{content:'✓';color:#fff;font-size:11px;line-height:1;}
.task-text{flex:1;font-size:13px;color:#1A2E1F;}
.task-text.done{text-decoration:line-through;color:#B0A898;}
.task-del{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.add-task-row{display:flex;gap:8px;margin-top:10px;}
.add-task-row input{flex:1;border:1px solid #DDD6C8;border-radius:10px;padding:10px 14px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none;color:#1A2E1F;}
.add-task-row input:focus{border-color:#2D5A3D;}
.add-task-row button{background:#2D5A3D;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;}

/* ── CLIENTS / LEADS LIST ── */
.list-pad{padding:16px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:#1A2E1F;}
.btn-add{background:#2D5A3D;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:500;}

.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{width:100%;border:1px solid #DDD6C8;border-radius:24px;padding:11px 16px 11px 40px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none;color:#1A2E1F;}
.search-wrap input:focus{border-color:#2D5A3D;}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:#9A8E7E;fill:none;stroke-width:1.8;pointer-events:none;}

.filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{border:1px solid #DDD6C8;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;background:#fff;color:#8A7E6E;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.ftab.active{background:#2D5A3D;color:#fff;border-color:#2D5A3D;}

/* Client row card */
.contact-card{background:#fff;border-radius:12px;border:1px solid #E8E1D8;margin-bottom:8px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background 0.1s;}
.contact-card:active{background:#F5F0E8;}
.contact-initials{width:40px;height:40px;border-radius:50%;background:#E8F0EA;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#2D5A3D;flex-shrink:0;}
.contact-info{flex:1;min-width:0;}
.contact-name{font-size:14px;font-weight:500;color:#1A2E1F;}
.contact-company{font-size:12px;color:#9A8E7E;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.contact-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.days-txt{font-size:11px;color:#B0A898;}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;padding:3px 8px;border-radius:6px;}
.badge-hot{background:#FDF4E0;color:#B8860B;}
.badge-active{background:#E8F5EE;color:#2D5A3D;}
.badge-followup{background:#FEF3E0;color:#C07820;}
.badge-cold{background:#F0EDE8;color:#8A7E6E;}
.badge-warm{background:#FEF3E0;color:#C07820;}
.badge-replied{background:#E8F5EE;color:#2D5A3D;}
.badge-noreply{background:#F0EDE8;color:#8A7E6E;}
.badge-notsent{background:#F0EDE8;color:#8A7E6E;}
.badge-sent{background:#FEF3E0;color:#C07820;}
.badge-bounced{background:#FDE8E8;color:#8B2020;}
.badge-stage{background:#F0EDE8;color:#6A5E4E;}

.empty-state{text-align:center;padding:48px 20px;color:#B0A898;font-size:14px;}

/* ── LEADS TABLE ── */
.leads-table{width:100%;border-collapse:collapse;font-size:13px;}
.leads-table th{text-align:left;font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#8A7E6E;padding:8px 12px;border-bottom:1px solid #DDD6C8;background:#FAF7F2;position:sticky;top:0;}
.leads-table td{padding:12px;border-bottom:1px solid #F0EBE0;color:#1A2E1F;vertical-align:middle;}
.leads-table tr:last-child td{border-bottom:none;}
.leads-table tr{background:#fff;cursor:pointer;}
.leads-table tr:active{background:#F8F5F0;}
.leads-table .td-name{font-weight:500;min-width:110px;}
.leads-table .td-email a{color:#2D5A3D;text-decoration:none;font-size:12px;}
.leads-table-wrap{background:#fff;border-radius:12px;border:1px solid #E8E1D8;overflow:hidden;}

/* ── PIPELINE ── */
.pipe-pad{padding:16px;}
.pipe-summary-card{background:linear-gradient(135deg,#1A3E28,#2D5A3D);border-radius:14px;padding:20px;margin-bottom:16px;color:#fff;}
.pipe-summary-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.pipe-summary-val{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;line-height:1;}
.pipe-summary-sub{font-size:12px;color:rgba(255,255,255,0.55);margin-top:4px;}

.pipe-stage-card{background:#fff;border-radius:12px;border:1px solid #E8E1D8;margin-bottom:10px;overflow:hidden;}
.pipe-stage-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F0EBE0;}
.pipe-stage-left{display:flex;align-items:center;gap:8px;}
.pipe-stage-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pipe-stage-name{font-size:13px;font-weight:600;color:#1A2E1F;}
.pipe-stage-count{background:#F0EDE8;color:#6A5E4E;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;}
.pipe-stage-val{font-size:13px;font-weight:500;color:#2D5A3D;}
.pipe-chips{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;}
.pipe-chip{background:#F5F2EC;border:1px solid #E0D8CC;border-radius:6px;padding:4px 10px;font-size:12px;color:#3A2E20;cursor:pointer;}
.pipe-chip:active{background:#E8E1D8;}

/* ── MODAL ── */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;}
#modal-box{position:absolute;bottom:0;left:0;right:0;background:#F2EDE4;border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto;max-width:480px;margin:0 auto;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 18px 14px;border-bottom:1px solid #DDD6C8;position:sticky;top:0;background:#F2EDE4;z-index:1;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:#1A2E1F;line-height:1.1;}
.modal-sub{font-size:12px;color:#8A7E6E;margin-top:3px;}
.modal-close{background:none;border:none;font-size:26px;color:#B0A898;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;}
.modal-body{padding:18px;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #F0EBE0;gap:12px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#9A8E7E;flex-shrink:0;}
.detail-value{font-size:13px;color:#1A2E1F;text-align:right;word-break:break-word;}
.detail-value a{color:#2D5A3D;text-decoration:none;}
.section-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#9A8E7E;margin:16px 0 8px;}
.notes-area{width:100%;border:1px solid #DDD6C8;border-radius:10px;padding:12px 14px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;resize:vertical;min-height:80px;outline:none;color:#1A2E1F;}
.notes-area:focus{border-color:#2D5A3D;}
.stage-select{width:100%;border:1px solid #DDD6C8;border-radius:10px;padding:11px 14px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;color:#1A2E1F;outline:none;}
.stage-select:focus{border-color:#2D5A3D;}
.btn-primary{background:#2D5A3D;color:#fff;border:none;border-radius:10px;padding:14px 20px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-top:14px;letter-spacing:0.02em;}
.btn-secondary{background:#fff;color:#2D5A3D;border:1px solid #2D5A3D;border-radius:10px;padding:13px 20px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-top:8px;}
.btn-danger{background:#fff;color:#8B2020;border:1px solid #F0D0D0;border-radius:10px;padding:13px 20px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-top:8px;}
.log-entry{padding:9px 0;border-bottom:1px solid #F0EBE0;font-size:12px;color:#6A5E4E;}
.log-entry:last-child{border-bottom:none;}
.log-date{font-weight:600;color:#2D5A3D;font-size:11px;}

/* Form */
.form-group{margin-bottom:12px;}
.form-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#9A8E7E;margin-bottom:5px;display:block;}
.form-input{width:100%;border:1px solid #DDD6C8;border-radius:10px;padding:11px 14px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none;color:#1A2E1F;}
.form-input:focus{border-color:#2D5A3D;}
.form-select{width:100%;border:1px solid #DDD6C8;border-radius:10px;padding:11px 14px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;color:#1A2E1F;outline:none;}
.form-select:focus{border-color:#2D5A3D;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Search modal */
.search-result-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #F0EBE0;cursor:pointer;}
.search-result-item:last-child{border-bottom:none;}
.search-result-item:active{opacity:0.7;}

/* Toast */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1A2E1F;color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;font-family:'Inter',sans-serif;opacity:0;transition:opacity 0.25s;z-index:600;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* Settings */
.settings-btn{border:1px solid #E8E1D8;border-radius:12px;background:#fff;padding:15px 16px;width:100%;text-align:left;font-size:14px;font-family:'Inter',sans-serif;color:#1A2E1F;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.settings-btn span.icon{font-size:18px;}
.settings-btn.danger{color:#8B2020;border-color:#F0D0D0;}
.settings-info-card{background:#fff;border:1px solid #E8E1D8;border-radius:12px;padding:0 16px;margin-bottom:12px;}
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-gem">
        <svg viewBox="0 0 24 24"><polygon points="12 2 22 9 18 20 6 20 2 9"/></svg>
      </div>
      <div class="sidebar-brand-name">RAMIGEM</div>
    </div>
    <div class="sidebar-workspace">
      <div class="sidebar-ws-label">Workspace</div>
      <div class="sidebar-ws-title">Home</div>
      <div class="sidebar-ws-desc">Sales intelligence for Colombian emerald relationships, campaign follow-up, and deal movement.</div>
    </div>
    <div class="sidebar-nav">
      <button class="snav-item active" data-page="home" onclick="goTo('home')">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </button>
      <button class="snav-item" data-page="clients" onclick="goTo('clients')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Existing Clients
      </button>
      <button class="snav-item" data-page="leads" onclick="goTo('leads')">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        New Leads
      </button>
      <button class="snav-item" data-page="pipeline" onclick="goTo('pipeline')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Pipeline

// ── HELPERS ──
function daysSince(d){if(!d)return 999;return Math.floor((Date.now()-new Date(d))/86400000);}
function todayISO(){return new Date().toISOString().split('T')[0];}
function fmtMoney(v){if(!v)return '—';return '$'+Number(v).toLocaleString();}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtDate(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function greet(){var h=new Date().getHours();if(h<12)return 'Good morning';if(h<17)return 'Good afternoon';return 'Good evening';}
function todayFmt(){return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}).toUpperCase();}
function uniqueId(p){return p+Date.now()+Math.random().toString(36).substr(2,5);}
function initials(n){if(!n)return '?';var p=n.trim().split(' ');return p.length>=2?p[0][0]+p[p.length-1][0]:p[0][0];}
function statusDotColor(s){if(s==='hot')return '#B8860B';if(s==='active')return '#2D5A3D';if(s==='followUp')return '#C07820';if(s==='warm')return '#C07820';return '#B0A898';}
function statusBadge(s){
  var m={hot:['badge-hot','HOT'],active:['badge-active','ACTIVE'],followUp:['badge-followup','FOLLOW UP'],cold:['badge-cold','COLD'],warm:['badge-warm','WARM']};
  var b=m[s]||['badge-cold',s];return '<span class="badge '+b[0]+'">'+b[1]+'</span>';
}
function priorityBadge(p){
  var m={hot:['badge-hot','HOT'],warm:['badge-warm','WARM'],cold:['badge-cold','COLD']};
  var b=m[p]||['badge-cold',p];return '<span class="badge '+b[0]+'">'+b[1]+'</span>';
}
function emailBadge(s){
  if(s==='Replied')return '<span class="badge badge-replied">REPLIED</span>';
  if(s==='Bounced')return '<span class="badge badge-bounced">BOUNCED</span>';
  if(s==='No Reply')return '<span class="badge badge-noreply">NO REPLY</span>';
  if(s==='Sent')return '<span class="badge badge-sent">SENT</span>';
  return '<span class="badge badge-notsent">NOT SENT</span>';
}
function stageName(s){
  var m={new:'New',contacted:'Contacted',discussion:'In Discussion',negotiation:'Negotiation',won:'Closed Won',lost:'Closed Lost'};
  return m[s]||s;
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function showModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-bg').style.display='block';}
function closeModal(){document.getElementById('modal-bg').style.display='none';}

function addTask(){

function openSearch(){

    '<div class="modal-title">Search</div>'+

    '</div>'+
    '<div id="search-results"></div>'+
    '</div>';
  showModal(html);
  setTimeout(function(){var i=document.getElementById('global-search-input');if(i)i.focus();},100);

function doSearch(q){
  var el=document.getElementById('search-results');
  if(!el)return;
  if(!q||q.length<2){el.innerHTML='';return;}
  var ql=q.toLowerCase();
  var matches=[];
  clients.forEach(function(c){
    if((c.name||'').toLowerCase().indexOf(ql)>-1||(c.company||'').toLowerCase().indexOf(ql)>-1||(c.email||'').toLowerCase().indexOf(ql)>-1){
      matches.push({type:'client',id:c.id,name:c.name,company:c.company,badge:statusBadge(c.status)});
    }
  });
  leads.forEach(function(l){
    if((l.name||'').toLowerCase().indexOf(ql)>-1||(l.company||'').toLowerCase().indexOf(ql)>-1||(l.email||'').toLowerCase().indexOf(ql)>-1){
      matches.push({type:'lead',id:l.id,name:l.name,company:l.company,badge:priorityBadge(l.priority)});
    }
  });
  if(matches.length===0){el.innerHTML='<div style="color:#9A8E7E;font-size:13px;padding:16px 0;text-align:center;">No results</div>';return;}
  el.innerHTML=matches.slice(0,20).map(function(m){
    return '<div class="search-result-item" onclick="closeModal();'+
      (m.type==='client'?'openClientModal':'openLeadModal')+'(\''+esc(m.id)+'\')">'+
      '<div style="width:36px;height:36px;border-radius:50%;background:#E8F0EA;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#2D5A3D;flex-shrink:0;">'+initials(m.name)+'</div>'+
      '<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;color:#1A2E1F;">'+esc(m.name)+'</div>'+
      '<div style="font-size:12px;color:#9A8E7E;margin-top:1px;">'+esc(m.company)+'</div></div>'+
      m.badge+'</div>';
  }).join('');
}

// ── PIPELINE ──
function renderPipeline(){
  var el=document.getElementById('page-pipeline');
  var stageOrder=['contacted','discussion','negotiation','won'];
  var stageColors={contacted:'#9A8E7E',discussion:'#C07820',negotiation:'#B8860B',won:'#2D5A3D',lost:'#8B2020'};
  var allItems=clients.map(function(c){return{name:c.name,stage:c.pipelineStage,value:c.dealValue,id:c.id,type:'client'};})
    .concat(leads.filter(function(l){return l.pipelineStage!=='new';}).map(function(l){return{name:l.name,stage:l.pipelineStage,value:l.dealValue,id:l.id,type:'lead'};}));
  var totalActive=allItems.filter(function(x){return x.stage!=='lost'&&x.stage!=='new';}).reduce(function(s,x){return s+(x.value||0);},0);
  var totalNeg=allItems.filter(function(x){return x.stage==='negotiation';}).reduce(function(s,x){return s+(x.value||0);},0);

  var stagesHtml=stageOrder.map(function(stage){
    var items=allItems.filter(function(x){return x.stage===stage;});
    if(items.length===0)return '';
    var chips=items.map(function(item){return '<span class="pipe-chip" onclick="'+(item.type==='client'?'openClientModal':'openLeadModal')+'(\''+esc(item.id)+'\')">'+esc(item.name)+'</span>';}).join('');
    var val=items.reduce(function(s,x){return s+(x.value||0);},0);
    return '<div class="pipe-stage-card">'+
      '<div class="pipe-stage-header">'+
      '<div class="pipe-stage-left">'+
      '<div class="pipe-stage-dot" style="background:'+stageColors[stage]+';"></div>'+
      '<div class="pipe-stage-name">'+stageName(stage)+'</div>'+
      '<span class="pipe-stage-count">'+items.length+'</span>'+
      '</div>'+
      '<div class="pipe-stage-val">'+fmtMoney(val)+'</div>'+
      '</div>'+
      '<div class="pipe-chips">'+chips+'</div>'+
      '</div>';
  }).join('');

  el.innerHTML='<div class="pipe-pad">'+
    '<div class="pipe-summary-card">'+
    '<div class="pipe-summary-label">Active Pipeline Value</div>'+
    '<div class="pipe-summary-val">'+fmtMoney(totalActive)+'</div>'+
    '<div class="pipe-summary-sub">'+fmtMoney(totalNeg)+' in negotiation</div>'+
    '</div>'+
    stagesHtml+
    '</div>';
}

function exportData(){
  var blob=new Blob([JSON.stringify({version:4,exported:new Date().toISOString(),clients:clients,leads:leads,tasks:tasks,convLogs:convLogs},null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='ramigem-crm-'+todayISO()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('Exported!');
}
function importData(){
  var input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=function(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.clients){clients=d.clients;save('rg4_clients',clients);}if(d.leads){leads=d.leads;save('rg4_leads',leads);}if(d.tasks){tasks=d.tasks;save('rg4_tasks',tasks);}if(d.convLogs){convLogs=d.convLogs;save('rg4_conv',convLogs);}toast('Imported!');renderSettings();}catch(err){toast('Invalid file');}};r.readAsText(file);};input.click();
}
function clearData(){
  if(!confirm('Reset all data to defaults?'))return;
  clients=JSON.parse(JSON.stringify(DEFAULT_CLIENTS));leads=JSON.parse(JSON.stringify(DEFAULT_LEADS));tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));convLogs={};
  save('rg4_clients',clients);save('rg4_leads',leads);save('rg4_tasks',tasks);save('rg4_conv',convLogs);
  toast('Reset done');renderSettings();
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',function(){
  goTo('home');
  // Register service worker for auto-updates
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      reg.addEventListener('updatefound',function(){
        var newWorker=reg.installing;
        newWorker.addEventListener('statechange',function(){
          if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
            // New version available — silently activate
            newWorker.postMessage({action:'skipWaiting'});
          }
        });
      });
    });
    // When new SW takes control, reload to get fresh content
    navigator.serviceWorker.addEventListener('controllerchange',function(){
      window.location.reload();
    });
  }
});
</script>
