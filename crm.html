<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ramigem CRM">
<meta name="theme-color" content="#F2EBD9">
<meta name="description" content="Ramigem Emerald CRM — Meir Harush">
<link rel="manifest" id="pwa-manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>Ramigem CRM</title>
<style>
:root {
  --bg: #F2EBD9;
  --bg2: #EDE4CE;
  --bg3: #E8DFC8;
  --card: #EAE0C8;
  --card2: #E3D8BF;
  --gold: #B8960C;
  --gold2: #D4AF37;
  --gold3: #F0D060;
  --cream: #1A1A1A;
  --cream2: #2D2D2D;
  --cream3: #555555;
  --muted: #8A7D6B;
  --hot: #E8543A;
  --active: #2ECC71;
  --followup: #F39C12;
  --cold: #5D8AA0;
  --nav-h: 72px;
  --hero-h: 80px;
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  overflow: hidden;
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
}

/* ── PAGES ── */
.page {
  display: none;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + 12px);
  opacity: 0;
  transition: opacity 0.25s ease;
  -webkit-overflow-scrolling: touch;
}
.page.active { display: block; }
.page.visible { opacity: 1; }

/* ── HERO STRIPS ── */
.hero {
  background: linear-gradient(135deg, #1B3A2D 0%, #2D5A3D 50%, #1B3A2D 100%);
  border-bottom: 1px solid rgba(184,150,12,0.25);
  padding: 20px 20px 16px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(184,150,12,0.12) 0%, transparent 70%);
  border-radius: 50%;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -20px; left: 20px;
  width: 80px; height: 80px;
  background: radial-gradient(circle, rgba(46,204,113,0.06) 0%, transparent 70%);
  border-radius: 50%;
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--cream);
  letter-spacing: 0.3px;
  position: relative;
  z-index: 1;
}
.hero-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}
.hero-gem {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold3) 50%, var(--gold) 100%);
  clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
  opacity: 0.85;
  z-index: 1;
}

/* ── BOTTOM NAV ── */
#bottom-nav {
  height: var(--nav-h);
  background: rgba(27,58,45,0.97);
  border-top: 1px solid rgba(184,150,12,0.35);
  display: flex;
  align-items: stretch;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: relative;
  z-index: 100;
  flex-shrink: 0;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 10px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 8px 4px;
  transition: color 0.2s;
  min-height: 44px;
}
.nav-item svg { width: 22px; height: 22px; transition: transform 0.2s; }
.nav-item.active { color: var(--gold2); }
.nav-item.active svg { transform: scale(1.1); }

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid rgba(184,150,12,0.12);
  border-radius: var(--radius);
  padding: 16px;
  margin: 0 16px 12px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,150,12,0.3), transparent);
}

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 8px;
  padding: 12px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid rgba(184,150,12,0.2);
  background: transparent;
  color: var(--muted);
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--bg);
  font-weight: 600;
}

/* ── SEARCH ── */
.search-wrap {
  padding: 12px 16px;
  position: relative;
}
.search-input {
  width: 100%;
  background: var(--card);
  border: 1px solid rgba(184,150,12,0.15);
  border-radius: 10px;
  padding: 10px 14px 10px 38px;
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: rgba(184,150,12,0.4); }
.search-icon {
  position: absolute;
  left: 28px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  width: 16px; height: 16px;
}

/* ── STATUS BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-hot { background: rgba(232,84,58,0.15); color: #E8543A; border: 1px solid rgba(232,84,58,0.3); }
.badge-active { background: rgba(46,204,113,0.12); color: #2ECC71; border: 1px solid rgba(46,204,113,0.25); }
.badge-followup { background: rgba(243,156,18,0.12); color: #F39C12; border: 1px solid rgba(243,156,18,0.25); }
.badge-cold { background: rgba(93,138,160,0.12); color: #5D8AA0; border: 1px solid rgba(93,138,160,0.25); }
.badge-bounced { background: rgba(150,50,50,0.15); color: #CC5555; border: 1px solid rgba(150,50,50,0.3); }
.badge-replied { background: rgba(100,180,100,0.15); color: #5BC878; border: 1px solid rgba(100,180,100,0.3); }
.badge-sent { background: rgba(90,130,200,0.15); color: #7AABF0; border: 1px solid rgba(90,130,200,0.3); }
.badge-notsent { background: rgba(100,100,100,0.15); color: #999; border: 1px solid rgba(100,100,100,0.3); }
.badge-noreply { background: rgba(180,140,40,0.15); color: #C9A83A; border: 1px solid rgba(180,140,40,0.3); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  min-height: 44px;
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color: var(--bg);
}
.btn-gold:active { opacity: 0.85; transform: scale(0.98); }
.btn-outline {
  background: transparent;
  border: 1px solid rgba(184,150,12,0.35);
  color: var(--gold2);
}
.btn-outline:active { background: rgba(184,150,12,0.08); }
.btn-ghost {
  background: rgba(184,150,12,0.08);
  color: var(--gold2);
  border: 1px solid rgba(184,150,12,0.15);
}
.btn-danger {
  background: rgba(200,60,60,0.1);
  color: #E06060;
  border: 1px solid rgba(200,60,60,0.2);
}
.btn-sm { padding: 6px 12px; font-size: 12px; min-height: 34px; border-radius: 8px; }
.btn-xs { padding: 4px 10px; font-size: 11px; min-height: 28px; border-radius: 6px; }
.btn-full { width: 100%; }

/* ── SECTION LABELS ── */
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--gold);
  padding: 16px 16px 8px;
}

/* ── DASHBOARD ── */
.greeting {
  padding: 20px 20px 0;
}
.greeting-name {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--cream);
  line-height: 1.2;
}
.greeting-date {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.5px;
}
.greeting-gem-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
}
.gem-dot {
  width: 8px; height: 8px;
  background: var(--gold);
  clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
  display: inline-block;
}

/* ALERT CARDS */
.alert-card {
  border-radius: var(--radius);
  padding: 14px;
  margin: 0 16px 10px;
  border: 1px solid;
  position: relative;
  overflow: hidden;
}
.alert-overdue {
  background: linear-gradient(135deg, rgba(232,84,58,0.08), rgba(200,40,20,0.05));
  border-color: rgba(232,84,58,0.3);
}
.alert-today {
  background: linear-gradient(135deg, rgba(243,156,18,0.08), rgba(220,140,0,0.05));
  border-color: rgba(243,156,18,0.3);
}
.alert-week {
  background: linear-gradient(135deg, rgba(46,204,113,0.06), rgba(30,180,90,0.04));
  border-color: rgba(46,204,113,0.2);
}
.alert-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.alert-overdue .alert-label { color: #E8543A; }
.alert-today .alert-label { color: #F39C12; }
.alert-week .alert-label { color: #2ECC71; }
.alert-name { font-size: 15px; font-weight: 600; color: var(--cream); }
.alert-company { font-size: 12px; color: var(--muted); margin-top: 1px; }
.alert-days { font-size: 11px; margin-top: 4px; }
.alert-overdue .alert-days { color: rgba(232,84,58,0.9); }
.alert-today .alert-days { color: rgba(243,156,18,0.9); }
.alert-week .alert-days { color: rgba(46,204,113,0.8); }
.alert-actions { display: flex; gap: 8px; margin-top: 10px; }

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 0 16px;
  margin-bottom: 4px;
}
.stat-box {
  background: var(--card);
  border: 1px solid rgba(184,150,12,0.12);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
}
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold2);
  line-height: 1;
}
.stat-label { font-size: 9px; color: var(--muted); margin-top: 4px; letter-spacing: 0.3px; text-transform: uppercase; }

/* TASKS */
.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(184,150,12,0.08);
}
.task-item:last-child { border-bottom: none; }
.task-check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid rgba(184,150,12,0.35);
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.task-check.done { background: var(--gold); border-color: var(--gold); }
.task-check.done::after { content: '✓'; font-size: 11px; color: var(--bg); font-weight: 700; }
.task-text { flex: 1; font-size: 13px; transition: all 0.2s; }
.task-text.done { text-decoration: line-through; color: var(--muted); }
.task-priority { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 2px 7px; border-radius: 10px; }
.priority-high { background: rgba(232,84,58,0.12); color: #E8543A; }
.priority-med { background: rgba(243,156,18,0.12); color: #F39C12; }
.priority-low { background: rgba(93,138,160,0.12); color: #5D8AA0; }
.task-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 6px; }

.add-task-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.add-task-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid rgba(184,150,12,0.2);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
}
.add-task-input::placeholder { color: var(--muted); }
.priority-select {
  background: var(--bg2);
  border: 1px solid rgba(184,150,12,0.2);
  border-radius: 8px;
  padding: 8px;
  color: var(--cream2);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}

/* CAMPAIGN CARD */
.campaign-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.campaign-title { font-weight: 600; font-size: 14px; color: var(--cream); }
.campaign-toggle { color: var(--gold); font-size: 18px; transition: transform 0.2s; }
.campaign-toggle.open { transform: rotate(180deg); }
.campaign-body { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
.campaign-body.open { max-height: 300px; }
.campaign-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin: 12px 0; }
.c-stat { text-align: center; }
.c-stat-num { font-size: 18px; font-weight: 700; color: var(--gold2); font-family: 'Playfair Display', serif; }
.c-stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
.campaign-note { background: rgba(184,150,12,0.06); border: 1px solid rgba(184,150,12,0.15); border-radius: 8px; padding: 10px; font-size: 12px; color: var(--cream2); }
.campaign-note span { color: var(--gold2); font-weight: 600; }

/* ── CLIENT CARDS ── */
.client-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border: 1px solid rgba(184,150,12,0.1);
  border-radius: var(--radius);
  padding: 14px;
  margin: 0 16px 10px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.client-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.client-card.hot::before { background: var(--hot); }
.client-card.active::before { background: var(--active); }
.client-card.followup::before { background: var(--followup); }
.client-card.cold::before { background: var(--cold); }
.client-card:active { transform: scale(0.99); opacity: 0.92; }

.client-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--bg3), var(--card2));
  border: 1px solid rgba(184,150,12,0.2);
  color: var(--gold2);
}
.client-info { flex: 1; min-width: 0; }
.client-name { font-size: 14px; font-weight: 600; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-company { font-size: 12px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-meta { font-size: 11px; color: var(--cream3); margin-top: 3px; }
.client-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

/* ── MODALS ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: flex-end;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border-radius: var(--radius) var(--radius) 0 0;
  border: 1px solid rgba(184,150,12,0.2);
  border-bottom: none;
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
  max-height: 90vh;
  overflow-y: auto;
  padding: 0 0 32px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-handle { width: 40px; height: 4px; background: rgba(184,150,12,0.3); border-radius: 2px; margin: 12px auto 0; }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(184,150,12,0.1);
}
.modal-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--cream); }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(184,150,12,0.08);
  border: 1px solid rgba(184,150,12,0.2);
  color: var(--gold2);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 16px 20px; }
.field-group { margin-bottom: 14px; }
.field-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
.field-value { font-size: 14px; color: var(--cream); }
.field-input, .field-select, .field-textarea {
  width: 100%;
  background: var(--card);
  border: 1px solid rgba(184,150,12,0.2);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.field-input:focus, .field-select:focus, .field-textarea:focus { border-color: rgba(184,150,12,0.45); }
.field-textarea { min-height: 80px; resize: vertical; }
.field-select option { background: var(--bg2); }

/* CONVERSATION LOG */
.conv-log { max-height: 200px; overflow-y: auto; margin: 8px 0; }
.conv-entry {
  background: rgba(184,150,12,0.04);
  border: 1px solid rgba(184,150,12,0.1);
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  font-size: 12px;
}
.conv-entry-date { color: var(--gold); font-size: 10px; font-weight: 600; margin-bottom: 3px; }
.conv-entry-text { color: var(--cream2); }

/* ── PIPELINE ── */
.pipeline-scroll {
  display: flex;
  gap: 12px;
  padding: 16px;
  overflow-x: auto;
  scrollbar-width: none;
  min-height: 400px;
}
.pipeline-scroll::-webkit-scrollbar { display: none; }
.pipeline-col {
  flex-shrink: 0;
  width: 200px;
  background: var(--card);
  border: 1px solid rgba(184,150,12,0.12);
  border-radius: var(--radius);
  overflow: hidden;
}
.pipeline-col-header {
  padding: 12px;
  border-bottom: 1px solid rgba(184,150,12,0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pipeline-col-name { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.pipeline-count {
  background: rgba(184,150,12,0.15);
  color: var(--gold2);
  border-radius: 10px;
  padding: 2px 7px;
  font-size: 11px;
  font-weight: 700;
}
.pipeline-cards { padding: 8px; display: flex; flex-direction: column; gap: 8px; min-height: 100px; }
.p-card {
  background: var(--bg3);
  border: 1px solid rgba(184,150,12,0.1);
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.p-card:active { transform: scale(0.97); }
.p-card-name { font-size: 12px; font-weight: 600; color: var(--cream); }
.p-card-company { font-size: 11px; color: var(--muted); margin-top: 2px; }
.p-card-value { font-size: 11px; color: var(--gold); margin-top: 4px; font-weight: 500; }
.p-card-type { font-size: 9px; color: var(--cream3); margin-top: 2px; }

/* pipeline column colors */
.pipeline-col[data-stage="New Lead"] .pipeline-col-name { color: #5D8AA0; }
.pipeline-col[data-stage="Contacted"] .pipeline-col-name { color: var(--gold2); }
.pipeline-col[data-stage="In Discussion"] .pipeline-col-name { color: #F39C12; }
.pipeline-col[data-stage="Negotiation"] .pipeline-col-name { color: #E8A830; }
.pipeline-col[data-stage="Closed Won"] .pipeline-col-name { color: var(--active); }
.pipeline-col[data-stage="Closed Lost"] .pipeline-col-name { color: #CC5555; }

/* MOVE STAGE SELECTOR */
.stage-picker {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
}
.stage-btn {
  padding: 8px;
  border-radius: 8px;
  border: 1px solid rgba(184,150,12,0.2);
  background: var(--card);
  color: var(--cream2);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.stage-btn.current { border-color: var(--gold); color: var(--gold); background: rgba(184,150,12,0.08); }
.stage-btn:active { opacity: 0.8; }

/* ── SETTINGS ── */
.settings-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card);
  border: 1px solid rgba(184,150,12,0.1);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin: 0 16px 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.settings-item:active { opacity: 0.8; }
.settings-item-left { display: flex; align-items: center; gap: 12px; }
.settings-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  background: rgba(184,150,12,0.08);
  border: 1px solid rgba(184,150,12,0.15);
}
.settings-item-info .settings-title { font-size: 14px; font-weight: 500; color: var(--cream); }
.settings-item-info .settings-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.settings-arrow { color: var(--muted); font-size: 16px; }

/* ── VERSION ── */
.version-card {
  text-align: center;
  padding: 24px 16px;
  margin: 0 16px;
}
.version-gem {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold3) 50%, var(--gold) 100%);
  clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
  margin: 0 auto 12px;
}
.version-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--cream); }
.version-info { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; }

/* ── LEAD CARDS ── */
.lead-card {
  background: var(--card);
  border: 1px solid rgba(184,150,12,0.1);
  border-radius: var(--radius);
  padding: 14px;
  margin: 0 16px 10px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.lead-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.lead-card.hot::before { background: var(--hot); }
.lead-card.warm::before { background: var(--followup); }
.lead-card.cold::before { background: var(--cold); }
.lead-card:active { transform: scale(0.99); opacity: 0.92; }
.lead-top { display: flex; align-items: flex-start; justify-content: space-between; }
.lead-name { font-size: 14px; font-weight: 600; color: var(--cream); }
.lead-company { font-size: 12px; color: var(--muted); margin-top: 1px; }
.lead-contact { font-size: 11px; color: var(--cream3); margin-top: 6px; }
.lead-contact a { color: var(--gold); text-decoration: none; }
.lead-meta-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.lead-days { font-size: 11px; color: var(--muted); }
.lead-actions { display: flex; gap: 8px; margin-top: 10px; }

/* ── NO RESULTS ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.empty-state svg { opacity: 0.3; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card2);
  border: 1px solid rgba(184,150,12,0.3);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 13px;
  color: var(--cream);
  z-index: 999;
  opacity: 0;
  transition: all 0.3s;
  white-space: nowrap;
  max-width: 90vw;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SECTION DIVIDER ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,150,12,0.15), transparent);
  margin: 4px 16px 16px;
}

/* ── OVERFLOW HANDLING ── */
.no-results { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }

/* ── SCROLLBAR STYLE ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(184,150,12,0.2); border-radius: 2px; }
</style>

})();

function load(key, def) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : def;
  } catch(e) { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function daysSince(isoDate) {
  if (!isoDate) return 999;
  const d = new Date(isoDate);
  const now = new Date();
  return Math.floor((now - d) / 86400000);
}

function formatDate(isoDate) {
  if (!isoDate) return '—';
  const d = new Date(isoDate);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function greetingTime() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function todayDate() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function initials(name) {
  return name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
}

function fmtMoney(v) {
  if (!v) return '';
  if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
  if (v >= 1000) return '$' + (v/1000).toFixed(0) + 'K';
  return '$' + v;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

function badgeHTML(status) {
  const map = { hot:'badge-hot', active:'badge-active', followup:'badge-followup', cold:'badge-cold', bounced:'badge-bounced', replied:'badge-replied', sent:'badge-sent', 'no reply':'badge-noreply', 'not sent':'badge-notsent' };
  const cls = map[status.toLowerCase()] || 'badge-notsent';
  const labels = { hot:'Hot', active:'Active', followup:'Follow Up', cold:'Cold', bounced:'Bounced', replied:'Replied', sent:'Sent', 'no reply':'No Reply', 'not sent':'Not Sent' };
  return `<span class="badge ${cls}">${labels[status.toLowerCase()] || status}</span>`;
}

// NAVIGATION
// ═══════════════════════════════════════════════════════════
let currentPage = 'dashboard';

function navigate(page) {
  if (currentPage === page) return;

  const oldPage = document.getElementById('page-' + currentPage);
  oldPage.classList.remove('visible');
  setTimeout(() => oldPage.classList.remove('active'), 250);

  currentPage = page;
  const newPage = document.getElementById('page-' + page);
  newPage.classList.add('active');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newPage.classList.add('visible');
    });
  });

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.page === page);
  });

  renderPage(page);
  newPage.scrollTop = 0;
}

function renderPage(page) {
  const renders = {
    dashboard: renderDashboard,
    clients: renderClients,
    leads: renderLeads,
    pipeline: renderPipeline,
    settings: renderSettings
  };
  if (renders[page]) renders[page]();
}

function renderDashboard() {
  const el = document.getElementById('page-dashboard');

  // Compute follow-up alerts from clients + leads combined
  const allContacts = [
    ...clients.map(c => ({...c, _type:'client'})),
    ...leads.filter(l => l.pipelineStage !== 'Closed Lost' && l.pipelineStage !== 'Closed Won')
            .map(l => ({...l, _type:'lead', status: l.priority === 'hot' ? 'hot' : (l.priority === 'warm' ? 'active' : 'cold')}))
  ];

  const overdue = allContacts.filter(c => daysSince(c.lastContact) > 7).sort((a,b) => daysSince(b.lastContact) - daysSince(a.lastContact)).slice(0, 5);

  // Tasks

function renderTasksHTML() {
  let html = '';
  tasks.forEach((t, i) => {
    html += `<div class="task-item">
      <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask(${i})"></div>
      <span class="task-text ${t.done ? 'done' : ''}">${t.text}</span>
      <span class="task-priority priority-${t.priority}">${t.priority}</span>
      <button class="task-del" onclick="deleteTask(${i})">×</button>
    </div>`;
  });
  html += `<div class="add-task-row">
    <input class="add-task-input" id="new-task-input" placeholder="Add task..." onkeydown="if(event.key==='Enter')addTask()">
    <select class="priority-select" id="new-task-priority">
      <option value="high">High</option>
      <option value="med" selected>Med</option>
      <option value="low">Low</option>
    </select>
    <button class="btn btn-gold btn-sm" onclick="addTask()">+</button>
  </div>`;
  return html;
}

function toggleTask(i) {
  tasks[i].done = !tasks[i].done;
  save('rami_tasks', tasks);
  const el = document.getElementById('tasks-container');
  if (el) el.innerHTML = renderTasksHTML();
}

function deleteTask(i) {
  tasks.splice(i, 1);
  save('rami_tasks', tasks);
  const el = document.getElementById('tasks-container');
  if (el) el.innerHTML = renderTasksHTML();
}

function addTask() {
  const input = document.getElementById('new-task-input');
  const priority = document.getElementById('new-task-priority');
  if (!input || !input.value.trim()) return;
  tasks.push({ id: 't' + Date.now(), text: input.value.trim(), priority: priority.value, done: false });
  save('rami_tasks', tasks);
  const el = document.getElementById('tasks-container');
  if (el) el.innerHTML = renderTasksHTML();
}

function toggleCampaign() {
  const body = document.getElementById('campaign-body');
  const toggle = document.getElementById('c-toggle');
  if (body) {
    body.classList.toggle('open');
    if (toggle) toggle.classList.toggle('open');
  }
}

function logContactQuick(id, type) {
  const today = todayISO();
  if (type === 'client') {
    const c = clients.find(x => x.id === id);
    if (c) {
      c.lastContact = today;
      if (c.status === 'cold') c.status = 'followup';
      addConvLog(id, 'Logged contact via dashboard quick action');
      save('rami_clients', clients);
    }
  } else {
    const l = leads.find(x => x.id === id);
    if (l) {
      l.lastContact = today;
      addConvLog(id, 'Logged contact via dashboard quick action');
      save('rami_leads', leads);
    }
  }
  toast('✓ Contact logged for today');
  renderDashboard();
}

}

function logContactFull(id, type) {

  if (type === 'client') {
    const c = clients.find(x => x.id === id);
    if (c) {
      c.lastContact = today;
      addConvLog(id, 'Contact logged');
      save('rami_clients', clients);
    }
  } else {
    const l = leads.find(x => x.id === id);
    if (l) {
      l.lastContact = today;
      addConvLog(id, 'Contact logged');
      save('rami_leads', leads);
    }
  }
  toast('✓ Contact logged for today');
  closeModal('modal-client');
  closeModal('modal-lead');
}

function addLog(id, type) {
  const el = document.getElementById('new-log-' + id);
  if (!el || !el.value.trim()) return;
  addConvLog(id, el.value.trim());
  save('rami_clients', clients);
  save('rami_leads', leads);
  el.value = '';
  const logEl = document.getElementById('conv-log-' + id);
  const logs = convLogs[id] || [];
  if (logEl) {
    logEl.innerHTML = logs.map(e=>`<div class="conv-entry"><div class="conv-entry-date">${e.date}</div><div class="conv-entry-text">${e.text}</div></div>`).join('');
    logEl.scrollTop = logEl.scrollHeight;
  }
  toast('✓ Log entry saved');
}

function addConvLog(id, text) {
  if (!convLogs[id]) convLogs[id] = [];
  convLogs[id].unshift({ date: new Date().toLocaleString('en-US', {month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}), text });
  save('rami_conv', convLogs);
}

    <div class="field-label">Priority</div>
    <select class="field-select" onchange="updateLead('${l.id}','priority',this.value)">
      ${['hot','warm','cold'].map(p=>`<option value="${p}" ${l.priority===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
    </select>
  </div>

  <div class="field-group">
    <div class="field-label">Pipeline Stage</div>
    <select class="field-select" onchange="updateLead('${l.id}','pipelineStage',this.value)">
      ${stages.map(s=>`<option value="${s}" ${l.pipelineStage===s?'selected':''}>${s}</option>`).join('')}
    </select>
  </div>

  <div class="field-group">
    <div class="field-label">Email Status</div>
    <select class="field-select" onchange="updateLead('${l.id}','emailStatus',this.value)">
      ${emailStatuses.map(s=>`<option value="${s}" ${(l.emailStatus||'Not Sent')===s?'selected':''}>${s}</option>`).join('')}
    </select>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="field-group">
      <div class="field-label">Email</div>
      <a href="mailto:${l.email}" style="color:var(--gold);font-size:13px;word-break:break-all">${l.email || '—'}</a>
    </div>
    <div class="field-group">
      <div class="field-label">Phone</div>
      <a href="tel:${l.phone}" style="color:var(--gold);font-size:13px">${l.phone || '—'}</a>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="field-group">
      <div class="field-label">Location</div>
      <div class="field-value">${(l.city||'') + (l.country ? ', '+l.country : '')}</div>
    </div>
    <div class="field-group">
      <div class="field-label">Deal Value</div>
      <div class="field-value" style="color:var(--gold2);font-weight:600">${fmtMoney(l.dealValue) || '—'}</div>
    </div>
  </div>

  <div class="field-group">
    <div class="field-label">Source</div>
    <div class="field-value">${l.source || '—'}</div>
  </div>

  <div class="field-group">
    <div class="field-label">Last Contact</div>
    <input type="date" class="field-input" value="${l.lastContact || ''}" onchange="updateLead('${l.id}','lastContact',this.value)">
  </div>

  <div class="field-group">
    <div class="field-label">Notes</div>
    <textarea class="field-textarea" placeholder="Add notes..." onchange="updateLead('${l.id}','notes',this.value)">${l.notes || ''}</textarea>
  </div>

  <div class="field-group">
    <div class="field-label">Quick Actions</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" onclick="setLeadEmailStatus('${l.id}','Replied')">✓ Mark Replied</button>
      <button class="btn btn-outline btn-sm" onclick="setLeadEmailStatus('${l.id}','Bounced')">✗ Mark Bounced</button>
      <button class="btn btn-outline btn-sm" onclick="scheduleFollowUp('${l.id}')">📅 Schedule</button>
    </div>
  </div>

  <div class="field-group">
    <div class="field-label">Conversation Log</div>
    <div class="conv-log" id="conv-log-${l.id}">
      ${logs.length === 0 ? '<p style="color:var(--muted);font-size:12px">No entries yet</p>' : logs.map(e=>`<div class="conv-entry"><div class="conv-entry-date">${e.date}</div><div class="conv-entry-text">${e.text}</div></div>`).join('')}
    </div>
    <textarea class="field-textarea" id="new-log-${l.id}" placeholder="Log note..." style="margin-top:8px;min-height:60px"></textarea>
    <button class="btn btn-outline btn-sm btn-full" style="margin-top:8px" onclick="addLog('${l.id}','lead')">+ Add Log Entry</button>
  </div>

  <button class="btn btn-gold btn-full" style="margin-top:8px" onclick="logContactFull('${l.id}','lead')">✓ Log Contact Today</button>`;

  document.getElementById('modal-lead-body').innerHTML = html;
  openModal('modal-lead');
}

function updateLead(id, field, value) {
  const l = leads.find(x => x.id === id);
  if (l) {
    l[field] = value;
    save('rami_leads', leads);
  }
}

function setLeadEmailStatus(id, status) {
  const l = leads.find(x => x.id === id);
  if (l) {
    l.emailStatus = status;
    if (status === 'Bounced') l.pipelineStage = 'Closed Lost';
    save('rami_leads', leads);
    toast('✓ Status updated: ' + status);
    openLeadModal(id);
  }
}

function scheduleFollowUp(id) {
  const d = prompt('Schedule follow-up — enter note:');
  if (d) {
    addConvLog(id, 'Follow-up scheduled: ' + d);
    save('rami_leads', leads);
    toast('✓ Follow-up scheduled');
  }
}

// ═══════════════════════════════════════════════════════════
// PIPELINE
// ═══════════════════════════════════════════════════════════
const STAGES = ['New Lead','Contacted','In Discussion','Negotiation','Closed Won','Closed Lost'];

function renderPipeline() {
  const el = document.getElementById('page-pipeline');
  const all = [
    ...clients.map(c => ({...c, _type:'client'})),
    ...leads.map(l => ({...l, _type:'lead'}))
  ];

  let html = `
  <div class="hero">
    <div class="hero-title">Pipeline</div>
    <div class="hero-sub">Across all stages</div>
    <div class="hero-gem"></div>
  </div>
  <div class="pipeline-scroll">`;

  STAGES.forEach(stage => {
    const cards = all.filter(x => x.pipelineStage === stage);
    html += `<div class="pipeline-col" data-stage="${stage}">
      <div class="pipeline-col-header">
        <span class="pipeline-col-name">${stage}</span>
        <span class="pipeline-count">${cards.length}</span>
      </div>
      <div class="pipeline-cards">`;
    cards.forEach(c => {
      html += `<div class="p-card" onclick="openPipelineModal('${c.id}','${c._type}')">
        <div class="p-card-name">${c.name}</div>
        <div class="p-card-company">${c.company || ''}</div>
        ${c.dealValue ? `<div class="p-card-value">${fmtMoney(c.dealValue)}</div>` : ''}
        <div class="p-card-type">${c._type === 'client' ? '👤 Client' : '🎯 Lead'}</div>
      </div>`;
    });
    if (cards.length === 0) html += `<div style="color:var(--muted);font-size:11px;text-align:center;padding:12px">Empty</div>`;
    html += `</div></div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}

function openPipelineModal(id, type) {
  const item = type === 'client' ? clients.find(x=>x.id===id) : leads.find(x=>x.id===id);
  if (!item) return;
  document.getElementById('modal-pipeline-title').textContent = item.name + ' — Move Stage';

  let html = `
  <div style="margin-bottom:12px">
    <div style="font-size:14px;font-weight:600;color:var(--cream)">${item.name}</div>
    <div style="font-size:12px;color:var(--muted)">${item.company || ''} · Current: <span style="color:var(--gold)">${item.pipelineStage}</span></div>
  </div>
  <div class="stage-picker">`;

  STAGES.forEach(s => {
    html += `<div class="stage-btn ${item.pipelineStage===s?'current':''}" onclick="moveStage('${id}','${type}','${s}')">${s}</div>`;
  });

  html += `</div>
  <div style="margin-top:16px;display:flex;gap:8px">
    <button class="btn btn-ghost btn-sm" onclick="${type==='client'?'openClientModal':'openLeadModal'}('${id}');closeModal('modal-pipeline')">Full Details</button>
    <button class="btn btn-outline btn-sm" onclick="closeModal('modal-pipeline')">Cancel</button>
  </div>`;

  document.getElementById('modal-pipeline-body').innerHTML = html;
  openModal('modal-pipeline');
}

function moveStage(id, type, stage) {
  if (type === 'client') {
    const c = clients.find(x=>x.id===id);
    if (c) { c.pipelineStage = stage; save('rami_clients', clients); }
  } else {
    const l = leads.find(x=>x.id===id);
    if (l) { l.pipelineStage = stage; save('rami_leads', leads); }
  }
  toast('✓ Moved to: ' + stage);
  closeModal('modal-pipeline');
  renderPipeline();
}

// ═══════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════

  const el = document.getElementById('page-settings');
  const totalClients = clients.length;
  const totalLeads = leads.length;

  let html = `
  <div class="hero">
    <div class="hero-title">Settings</div>
    <div class="hero-sub">Data & Preferences</div>
    <div class="hero-gem"></div>
  </div>

  <div style="height:8px"></div>

  <div class="settings-item" onclick="exportData()">
    <div class="settings-item-left">
      <div class="settings-icon">📤</div>
      <div class="settings-item-info">
        <div class="settings-title">Export Data</div>
        <div class="settings-desc">${totalClients} clients · ${totalLeads} leads · JSON format</div>
      </div>
    </div>
    <span class="settings-arrow">›</span>
  </div>

  <div class="settings-item" onclick="importData()">
    <div class="settings-item-left">
      <div class="settings-icon">📥</div>
      <div class="settings-item-info">
        <div class="settings-title">Import Data</div>
        <div class="settings-desc">Restore from JSON backup</div>
      </div>

    <span class="settings-arrow">›</span>

    <div class="settings-item-left">

      <div class="settings-item-info">
        <div class="settings-title" style="color:#E06060">Clear All Data</div>
        <div class="settings-desc">Resets to factory defaults</div>
      </div>
    </div>
    <span class="settings-arrow">›</span>
  </div>

  <div class="version-card">
    <div class="version-gem"></div>
    <div class="version-name">Ramigem CRM</div>
    <div class="version-info">Version 2.0 — April 2026</div>
    <div class="version-info" style="margin-top:4px">Meir Harush · Business Development</div>
    <div class="version-info" style="margin-top:8px;color:var(--gold);font-size:12px">Muzo Mine · Colombian Emeralds</div>
  </div>`;

  el.innerHTML = html;
}

function exportData() {
  const data = {
    version: '2.0',
    exported: new Date().toISOString(),
    clients,
    leads,
    tasks,
    convLogs,
    meetings
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ramigem-crm-backup-' + todayISO() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Data exported');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.clients) { clients = data.clients; save('rami_clients', clients); }
        if (data.leads) { leads = data.leads; save('rami_leads', leads); }
        if (data.tasks) { tasks = data.tasks; save('rami_tasks', tasks); }
        if (data.convLogs) { convLogs = data.convLogs; save('rami_conv', convLogs); }
        toast('✓ Data imported successfully');
        renderPage(currentPage);
      } catch(err) {
        toast('✗ Invalid file format');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearData() {
  if (confirm('Clear all data and reset to defaults? This cannot be undone.')) {
    clients = JSON.parse(JSON.stringify(DEFAULT_CLIENTS));
    leads = JSON.parse(JSON.stringify(DEFAULT_LEADS));
    tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
    convLogs = {};
    saveAll();
    toast('✓ Data reset to defaults');
    renderPage(currentPage);
  }
}
