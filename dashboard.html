<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Einstein Dashboard — Ramigem</title>
<style>
  :root {
    --bg: #0a0f0a;
    --panel: #111a11;
    --border: #1e3a1e;
    --green: #2d7a2d;
    --green-light: #4caf50;
    --green-bright: #66ff66;
    --text: #d4e8d4;
    --text-dim: #7a9a7a;
    --text-bright: #f0fff0;
    --yellow: #c8b400;
    --red: #c84040;
    --blue: #4080c8;
    --card-bg: #0d180d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 18px;
    color: var(--green-bright);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  header .status-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green-light);
    margin-right: 8px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .subtitle { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
  .last-refresh { color: var(--text-dim); font-size: 11px; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 16px;
    padding: 16px;
  }
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .panel.full-width { grid-column: 1 / -1; }
  .panel-header {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    color: var(--green-bright);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .panel-count {
    color: var(--text-dim);
    font-size: 11px;
  }
  .panel-body { padding: 12px; max-height: 320px; overflow-y: auto; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: var(--bg); }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); }

  /* Log feed */
  .log-line {
    padding: 4px 0;
    border-bottom: 1px solid #0f1f0f;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .log-time { color: var(--text-dim); flex-shrink: 0; font-size: 11px; min-width: 130px; }
  .log-msg { color: var(--text); line-height: 1.4; }
  .log-type { font-size: 10px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
  .log-type.heartbeat { background: #1a3a1a; color: var(--green-light); }
  .log-type.task { background: #1a2a3a; color: var(--blue); }
  .log-type.memory { background: #2a2a0a; color: var(--yellow); }
  .log-type.system { background: #2a0a0a; color: var(--red); }

  /* Tasks */
  .task-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .task-card:last-child { margin-bottom: 0; }
  .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .task-title { color: var(--text-bright); font-size: 12px; font-weight: bold; }
  .task-status {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'Courier New', monospace;
  }
  .task-status.done { background: #1a3a1a; color: var(--green-light); }
  .task-status.in-progress { background: #1a2a3a; color: var(--blue); }
  .task-status.pending { background: #2a2a0a; color: var(--yellow); }
  .task-meta { color: var(--text-dim); font-size: 11px; margin-top: 4px; }

  /* Timeline */
  .timeline { padding: 12px 16px; }
  .timeline-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
  }
  .timeline-date { color: var(--text-dim); font-size: 11px; min-width: 80px; }
  .timeline-bar-wrap { flex: 1; height: 20px; background: #0d180d; border-radius: 3px; overflow: hidden; position: relative; }
  .timeline-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, var(--green-light) 100%);
    border-radius: 3px;
    min-width: 4px;
    transition: width 0.5s ease;
  }
  .timeline-count { color: var(--text-dim); font-size: 11px; min-width: 40px; text-align: right; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px;
    grid-column: 1 / -1;
  }
  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    text-align: center;
  }
  .stat-num { font-size: 28px; color: var(--green-bright); font-weight: bold; }
  .stat-label { color: var(--text-dim); font-size: 11px; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

  /* Activity heatmap */
  .heatmap { padding: 12px 16px; }
  .heatmap-grid { display: flex; gap: 3px; flex-wrap: wrap; }
  .heatmap-cell {
    width: 14px; height: 14px;
    border-radius: 2px;
    background: #0d180d;
    cursor: default;
    transition: transform 0.1s;
  }
  .heatmap-cell:hover { transform: scale(1.3); }
  .heatmap-cell.l1 { background: #1a3a1a; }
  .heatmap-cell.l2 { background: #2d7a2d; }
  .heatmap-cell.l3 { background: #4caf50; }
  .heatmap-cell.l4 { background: #66ff66; }
  .heatmap-legend { display: flex; align-items: center; gap: 6px; margin-top: 8px; color: var(--text-dim); font-size: 11px; }
  .heatmap-legend-cell { width: 12px; height: 12px; border-radius: 2px; }

  .no-data { color: var(--text-dim); font-size: 12px; padding: 20px; text-align: center; }
</style>
</head>
<body>

<header>
  <div>
    <h1><span class="status-dot"></span>Einstein — Live Dashboard</h1>
    <div class="subtitle">Ramigem AI Companion · Real-time activity</div>
  </div>
  <div class="last-refresh" id="lastRefresh">Loading...</div>
</header>

<div class="grid" id="statsRow">
  <!-- Stats will be injected here -->
</div>

<script>
// ============================================================
// DATA — injected at build time, refreshed on each push
// ============================================================
const BUILD_TIME = "2026-05-01T22:05:00Z";

const HEARTBEATS = [
  "2026-04-29 10:57 UTC","2026-04-29 11:12 UTC","2026-04-29 11:27 UTC",
  "2026-04-29 11:42 UTC","2026-04-29 11:57 UTC","2026-04-29 12:12 UTC",
  "2026-04-29 12:27 UTC","2026-04-29 12:42 UTC","2026-04-29 13:16 UTC",
  "2026-04-29 13:31 UTC","2026-04-29 14:01 UTC","2026-04-29 14:16 UTC",
  "2026-04-29 14:31 UTC","2026-04-29 14:46 UTC","2026-04-29 15:01 UTC",
  "2026-04-29 15:16 UTC","2026-04-29 15:31 UTC","2026-04-29 15:46 UTC",
  "2026-04-29 16:01 UTC","2026-04-29 16:20 UTC",
  "2026-05-01 11:02 UTC","2026-05-01 22:05 UTC"
];

const TASKS = [
  { id:1, title:"Build salary comparison table (Hebrew + English)", status:"done", date:"2026-04-29", by:"Meir" },
  { id:2, title:"Edit emerald photos — black background crop", status:"done", date:"2026-04-29", by:"Meir" },
  { id:3, title:"Extract full inventory to printable list (1,418 lots)", status:"done", date:"2026-04-29", by:"Meir" },
  { id:4, title:"Build CRM v7 — luxury redesign (118 contacts)", status:"done", date:"2026-04-30", by:"Meir" },
  { id:5, title:"Remove Lab/Sell/Ask columns from inventory PDF", status:"done", date:"2026-04-30", by:"Meir" },
  { id:6, title:"Diagnose DNS issue — app.ramigem.com / CRM link", status:"done", date:"2026-05-01", by:"Meir" },
  { id:7, title:"Build Einstein live dashboard (this page)", status:"in-progress", date:"2026-05-01", by:"Michael" }
];

const MEMORY_EVENTS = [
  { time:"2026-04-27", msg:"Loaded full context: inventory, campaign history, CRM build guide, 30-day plan" },
  { time:"2026-04-28", msg:"CRM v4 built + deployed to GitHub Pages" },
  { time:"2026-04-29", msg:"Salary tables built. Emerald photo edited. 1,418-lot inventory extracted." },
  { time:"2026-04-30", msg:"CRM v7 complete. Inventory column cleanup. Camera tips for iPad Pro." },
  { time:"2026-05-01", msg:"DNS diagnosed. Michael Matias authorized by Meir. Dashboard build started." }
];

// ============================================================
// RENDER
// ============================================================
function formatTime(str) {
  return str.replace(' UTC','').replace('T',' ').replace('Z','');
}

function renderStats() {
  const doneTasks = TASKS.filter(t=>t.status==='done').length;
  const activeDays = [...new Set(HEARTBEATS.map(h=>h.slice(0,10)))].length;
  const totalBeats = HEARTBEATS.length;
  const statsHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${totalBeats}</div><div class="stat-label">Heartbeats</div></div>
      <div class="stat-card"><div class="stat-num">${activeDays}</div><div class="stat-label">Active Days</div></div>
      <div class="stat-card"><div class="stat-num">${doneTasks}</div><div class="stat-label">Tasks Done</div></div>
      <div class="stat-card"><div class="stat-num">${TASKS.filter(t=>t.status==='in-progress').length}</div><div class="stat-label">In Progress</div></div>
    </div>
  `;
  return statsHTML;
}

function renderLog() {
  const items = [];
  HEARTBEATS.slice().reverse().forEach(h=>{
    items.push({ time: h, msg: "Heartbeat — system alive", type: "heartbeat" });
  });
  MEMORY_EVENTS.slice().reverse().forEach(e=>{
    items.push({ time: e.time + " 00:00 UTC", msg: e.msg, type: "memory" });
  });
  items.sort((a,b) => b.time.localeCompare(a.time));
  return items.slice(0,40).map(i=>`
    <div class="log-line">
      <span class="log-time">${formatTime(i.time)}</span>
      <span class="log-type ${i.type}">${i.type}</span>
      <span class="log-msg">${i.msg}</span>
    </div>
  `).join('');
}

function renderTasks() {
  return TASKS.slice().reverse().map(t=>`
    <div class="task-card">
      <div class="task-header">
        <span class="task-title">${t.title}</span>
        <span class="task-status ${t.status}">${t.status.replace('-',' ')}</span>
      </div>
      <div class="task-meta">${t.date} · assigned by ${t.by}</div>
    </div>
  `).join('');
}

function renderTimeline() {
  const byDate = {};
  HEARTBEATS.forEach(h=>{
    const d = h.slice(0,10);
    byDate[d] = (byDate[d]||0)+1;
  });
  const dates = Object.keys(byDate).sort();
  const max = Math.max(...Object.values(byDate));
  return dates.map(d=>`
    <div class="timeline-row">
      <span class="timeline-date">${d}</span>
      <div class="timeline-bar-wrap">
        <div class="timeline-bar" style="width:${Math.max(4,(byDate[d]/max)*100)}%"></div>
      </div>
      <span class="timeline-count">${byDate[d]} ✓</span>
    </div>
  `).join('');
}

function renderHeatmap() {
  const byDate = {};
  HEARTBEATS.forEach(h=>{
    const d = h.slice(0,10);
    byDate[d] = (byDate[d]||0)+1;
  });
  // last 30 days
  const cells = [];
  for(let i=29;i>=0;i--){
    const d = new Date(Date.now()-i*86400000);
    const ds = d.toISOString().slice(0,10);
    const count = byDate[ds]||0;
    const level = count===0?'':count<5?'l1':count<10?'l2':count<15?'l3':'l4';
    cells.push(`<div class="heatmap-cell ${level}" title="${ds}: ${count} heartbeats"></div>`);
  }
  return `
    <div class="heatmap-grid">${cells.join('')}</div>
    <div class="heatmap-legend">
      Less <div class="heatmap-legend-cell" style="background:#0d180d"></div>
      <div class="heatmap-legend-cell" style="background:#1a3a1a"></div>
      <div class="heatmap-legend-cell" style="background:#2d7a2d"></div>
      <div class="heatmap-legend-cell" style="background:#4caf50"></div>
      <div class="heatmap-legend-cell" style="background:#66ff66"></div>
      More
    </div>
  `;
}

function render() {
  const grid = document.getElementById('statsRow');
  grid.innerHTML = `
    ${renderStats()}
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📋 Task Board</span>
        <span class="panel-count">${TASKS.length} tasks</span>
      </div>
      <div class="panel-body">${renderTasks()}</div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📡 Activity Log</span>
        <span class="panel-count">last 40 events</span>
      </div>
      <div class="panel-body">${renderLog()}</div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📊 Daily Timeline</span>
        <span class="panel-count">heartbeats/day</span>
      </div>
      <div class="timeline">${renderTimeline()}</div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🗓 Activity Heatmap</span>
        <span class="panel-count">last 30 days</span>
      </div>
      <div class="heatmap">${renderHeatmap()}</div>
    </div>
  `;

  document.getElementById('lastRefresh').textContent =
    'Built: ' + BUILD_TIME.replace('T',' ').replace('Z',' UTC') +
    ' · Page loaded: ' + new Date().toUTCString().replace(/:\d\d GMT/, ' UTC');
}

render();

// Auto-reload every 5 minutes to get latest pushed version
setTimeout(()=>location.reload(), 5*60*1000);
</script>
</body>
</html>
